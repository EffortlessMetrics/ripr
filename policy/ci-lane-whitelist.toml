schema_version = "1.0"
policy = "ci-lane-whitelist"
owner = "release/ci"
status = "active"

# Whitelist of every CI lane this repo is allowed to spend LEM on.
#
# Each lane records:
#   id              stable identifier; referenced by PR Plan, budget guard
#   workflow        path to the .yml that runs it
#   job             the job key inside that workflow
#   kind            test | policy | build | release | report | self-dogfood
#   tier            frontdoor | deep | release | dogfood | docs
#   default_pr      true if it runs on every PR
#   blocking        true if a failure fails the merge
#   runner          maps to runner_multipliers in policy/ci-budget.toml
#   base_lem        forecast lower bound for forecast (advisory)
#   owner           team/code-area who owns the lane
#   intent          one-line statement of why this lane exists
#   failure_mode    bug class blocked by this lane
#   proof_obligation single command/check this lane evaluates
#   evidence        artifacts/logs the lane uploads
#   allowed_triggers events that are allowed to run this lane
#   duplicate_of    other lanes that subsume this one (for retirement)
#   review_after    date for next review of this lane
#   expires         date this lane must be re-justified
#
# The CI lane whitelist lint (PR 03) reads this file and the matching
# workflow YAML and verifies that every job/step is accounted for.

# ---------------------------------------------------------------------------
# Front-door PR gate
# ---------------------------------------------------------------------------

[[lane]]
id = "rust_fast_gate"
workflow = ".github/workflows/ci.yml"
job = "rust"
kind = "build"
tier = "frontdoor"
default_pr = true
blocking = true
runner = "ubuntu_latest"
base_lem = 8
owner = "core/rust"
intent = "Verify the workspace builds, tests pass, fmt is clean, and clippy is silent before deeper validation."
failure_mode = "Type errors, format drift, clippy regressions, or test regressions land on main."
proof_obligation = "cargo fmt --check && cargo check --workspace --all-targets && cargo clippy --workspace --all-targets -- -D warnings && cargo test --workspace"
evidence = ["job logs", "target/ripr/reports/*"]
allowed_triggers = ["pull_request", "push"]
duplicate_of = []
review_after = "2026-06-07"
expires = "2026-11-07"

[[lane]]
id = "msrv"
workflow = ".github/workflows/ci.yml"
job = "msrv"
kind = "build"
tier = "frontdoor"
default_pr = true
blocking = true
runner = "ubuntu_latest"
base_lem = 4
owner = "core/rust"
intent = "Verify the workspace still builds against the declared MSRV (1.93.1)."
failure_mode = "Code that requires a newer toolchain than declared lands on main and silently breaks downstream consumers."
proof_obligation = "cargo +1.93.1 check --workspace --all-targets"
evidence = ["job logs"]
allowed_triggers = ["pull_request", "push"]
duplicate_of = []
review_after = "2026-06-07"
expires = "2026-11-07"

