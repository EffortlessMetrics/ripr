schema_version = "1.0"
policy = "non-rust-allowlist"
owner = "core/policy"
status = "shadow"

# Migration target for the non-Rust file allowlist.
#
# The canonical source-of-truth for `cargo xtask check-file-policy` remains
# `policy/non_rust_allowlist.txt` (pipe-delimited) until the checker is
# updated to consume this TOML in a follow-up PR. This file is the
# governed schema-bearing mirror of the txt allowlist, with added
# `surface`, `classification`, and `covered_by` fields.
#
# Schema:
#   glob            file pattern this entry matches
#   kind            short tag from the legacy txt format
#   owner           team/area responsible for the file
#   surface         ci | editor | docs | fixtures | rust | repo | brand | config | security
#   classification  production | test | tooling | generated | config | docs | fixture | metadata
#   reason          one-line justification (matches the existing txt reason)
#   covered_by      list of commands or checks that exercise this surface
#   expires         (optional) date this entry must be re-justified
#   retired         (optional) true if the entry is allowed to be unused
#
# See docs/FILE_POLICY.md for the doctrine.

# ---------------------------------------------------------------------------
# Documentation surfaces
# ---------------------------------------------------------------------------

[[allow]]
glob = "*.md"
kind = "documentation"
owner = "docs"
surface = "docs"
classification = "docs"
reason = "Root documentation."
covered_by = ["cargo xtask check-doc-index", "cargo xtask markdown-links"]

[[allow]]
glob = "AGENTS.md"
kind = "documentation"
owner = "agents"
surface = "docs"
classification = "docs"
reason = "Agent instructions."
covered_by = ["cargo xtask check-readme-state"]

[[allow]]
glob = "CHANGELOG.md"
kind = "documentation"
owner = "docs"
surface = "docs"
classification = "docs"
reason = "Repository changelog."
covered_by = ["cargo xtask check-doc-index"]

[[allow]]
glob = "CONTRIBUTING.md"
kind = "documentation"
owner = "docs"
surface = "docs"
classification = "docs"
reason = "Contribution guide."
covered_by = []

[[allow]]
glob = "README.md"
kind = "documentation"
owner = "docs"
surface = "docs"
classification = "docs"
reason = "Repository README."
covered_by = ["cargo xtask check-readme-state"]

[[allow]]
glob = "docs/**"
kind = "documentation"
owner = "docs"
surface = "docs"
classification = "docs"
reason = "Documentation, examples, snippets, and reference material."
covered_by = ["cargo xtask check-doc-index", "cargo xtask check-spec-format"]

