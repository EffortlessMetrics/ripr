schema = 1
msrv = "1.93"

# Machine-readable ledger of the lint profile this repository enforces and
# plans to enforce. The ledger is the source of truth that `cargo xtask
# check-lint-policy` cross-checks against `[workspace.lints]` in the root
# `Cargo.toml`. It also records lints that are intentionally deferred until
# the workspace MSRV is bumped, so future Rust upgrades become a mechanical
# flip rather than a rediscovery exercise.
#
# Status values:
#   active          - must appear in [workspace.lints.*] at the documented level
#   planned         - intentionally deferred; do not enable until activate_when_msrv
#   deferred        - intentionally not enabled today (codebase churn / scope)
#
# Class values are advisory and used for grouping in the human policy doc.

[policy]
# Tests are NOT a panic playground. Setup, parsing, IO, indexing, and fixture
# plumbing must be fallible. Assertions (`assert!`, `assert_eq!`, etc.) are
# the test harness's failure mechanism and remain allowed.
panic_free_tests = true
allow_test_carveouts = false

# Suppressions go through `#[expect(..., reason = "...")]`, not silent
# `#[allow]`. The active-lint set enforces this.
suppression_style = "expect-with-reason"

# Do not turn on entire Clippy categories (`pedantic`, `restriction`) at the
# workspace level. Pick lints deliberately so future Clippy releases do not
# create surprise failures across unrelated PRs.
blanket_categories = false

# ---------------------------------------------------------------------------
# Active lints - already enforced in [workspace.lints.*] in the root Cargo.toml.
# ---------------------------------------------------------------------------

[[lint]]
