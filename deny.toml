# cargo-deny policy for ripr.
#
# This is intentionally narrow: advisories, licenses, bans, and sources are
# enforced; duplicate dependency findings start as warnings until the graph has
# a stable baseline.

[graph]
all-features = true
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "x86_64-pc-windows-msvc" },
    { triple = "x86_64-apple-darwin" },
    { triple = "aarch64-apple-darwin" },
    { triple = "aarch64-unknown-linux-gnu" },
]

[advisories]
yanked = "deny"
ignore = []

[licenses]
confidence-threshold = 0.8
allow = [
    "Apache-2.0",
    # Permissive Apache-2.0 variant with the LLVM compiler-runtime
    # exception, OSI-approved and SPDX-tracked. Reached the dependency
    # graph via `oxc_*` crates (the TypeScript/JavaScript parser approved
    # by ADR 0008 for the Campaign 27 preview adapter); the underlying
    # transitive crate dual-licenses as `Apache-2.0 WITH LLVM-exception
    # OR BSL-1.0`, so allowing either satisfies cargo-deny.
    "Apache-2.0 WITH LLVM-exception",
    # OSI-approved and FSF Free/Libre. Permissive, universally accepted
    # as compatible with MIT/Apache. Reached the dependency graph via the
    # same `oxc_*` transitive that dual-licenses with LLVM-exception.
    "BSL-1.0",
    "MIT",
    "MIT-0",
    "Unicode-3.0",
    # OSI-approved and FSF Free/Libre. Permissive, universally accepted as
    # compatible with MIT/Apache. Reached the dependency graph via
    # `zlib-rs` (the pure-Rust zlib port pulled by `flate2` underneath the
    # `zip` crate used by `cargo xtask release-server-archive`).
    "Zlib",
]

[licenses.private]
ignore = false

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
allow = []
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
