name: CI

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --check
      - run: cargo check --workspace --all-targets
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - run: cargo xtask check-static-language
      - run: cargo xtask check-no-panic-family
      - run: cargo xtask check-file-policy
      - run: cargo xtask check-executable-files
      - run: cargo xtask check-workflows
      - run: cargo xtask check-spec-format
      - run: cargo xtask check-fixture-contracts
      - run: cargo package -p ripr --list
      - run: cargo publish -p ripr --dry-run

  vscode:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editors/vscode
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json
      - run: npm ci
      - run: npm run compile
      - run: npm run package
