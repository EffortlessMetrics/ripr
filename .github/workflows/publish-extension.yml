name: Publish VSCode Extension

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version label for the VSIX artifact, for example 0.1.0"
        required: true
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editors/vscode
    env:
      EXTENSION_VERSION: ${{ github.event.inputs.version || github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Package VSIX
        run: |
          mkdir -p dist
          npx @vscode/vsce package --out "dist/ripr-${EXTENSION_VERSION}.vsix"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: ripr-vsix
          path: editors/vscode/dist/*.vsix

  publish:
    needs: package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/download-artifact@v4
        with:
          name: ripr-vsix
          path: dist

      - name: Publish to VS Marketplace
        run: npx -y @vscode/vsce publish --packagePath dist/*.vsix --pat "$VS_MARKETPLACE_TOKEN"
        env:
          VS_MARKETPLACE_TOKEN: ${{ secrets.VS_MARKETPLACE_TOKEN }}

      - name: Publish to Open VSX
        run: npx -y ovsx publish dist/*.vsix -p "$OPEN_VSX_TOKEN"
        env:
          OPEN_VSX_TOKEN: ${{ secrets.OPEN_VSX_TOKEN }}

      - name: Attach VSIX to GitHub Release
        if: ${{ github.ref_type == 'tag' }}
        run: gh release upload "${{ github.ref_name }}" dist/*.vsix --clobber
        env:
          GH_TOKEN: ${{ github.token }}
