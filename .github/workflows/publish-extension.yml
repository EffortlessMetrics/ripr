name: Publish VSCode Extension

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version label for the VSIX artifact, for example 0.2.0"
        required: true
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editors/vscode
    env:
      EXTENSION_VERSION: ${{ github.event.inputs.version || github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Package VSIX
        run: |
          mkdir -p dist
          npx @vscode/vsce package --out "dist/ripr-${EXTENSION_VERSION}.vsix"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: ripr-vsix
          path: editors/vscode/dist/*.vsix

  server-assets-ready:
    runs-on: ubuntu-latest
    env:
      RAW_VERSION: ${{ github.event.inputs.version || github.ref_name }}
    steps:
      - name: Wait for server manifest
        run: |
          version="${RAW_VERSION#v}"
          url="https://github.com/${GITHUB_REPOSITORY}/releases/download/v${version}/ripr-server-manifest-v${version}.json"
          for attempt in $(seq 1 90); do
            status="$(curl -L -sS -o /dev/null -w "%{http_code}" "$url" || true)"
            if [ "$status" = "200" ]; then
              echo "Found $url"
              exit 0
            fi
            echo "Waiting for $url (attempt $attempt/90, HTTP $status)"
            sleep 20
          done
          echo "Server manifest was not available: $url" >&2
          exit 1

  publish-vs-marketplace:
    needs: [package, server-assets-ready]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/download-artifact@v4
        with:
          name: ripr-vsix
          path: dist

      - name: Publish to VS Marketplace
        run: npx -y @vscode/vsce publish --packagePath dist/*.vsix --pat "$VS_MARKETPLACE_TOKEN"
        env:
          VS_MARKETPLACE_TOKEN: ${{ secrets.VS_MARKETPLACE_TOKEN }}

  publish-open-vsx:
    needs: [package, server-assets-ready]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/download-artifact@v4
        with:
          name: ripr-vsix
          path: dist

      - name: Publish to Open VSX
        run: npx -y ovsx publish dist/*.vsix -p "$OPEN_VSX_TOKEN"
        env:
          OPEN_VSX_TOKEN: ${{ secrets.OPEN_VSX_TOKEN }}

  attach-release-asset:
    needs: package
    if: ${{ github.ref_type == 'tag' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ripr-vsix
          path: dist

      - name: Attach VSIX to GitHub Release
        run: |
          gh release view "${{ github.ref_name }}" >/dev/null 2>&1 || gh release create "${{ github.ref_name }}" --title "ripr ${{ github.ref_name }}"
          gh release upload "${{ github.ref_name }}" dist/*.vsix --clobber
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
