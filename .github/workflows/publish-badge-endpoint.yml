name: Publish badge endpoint

# Publishes repo-scoped Shields-compatible badge JSON to GitHub Pages
# from `main` runs only. PR workflows MUST NOT publish — the `if:` guard
# below is the contract. See docs/BADGE_POLICY.md for endpoint semantics.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Pages deployments must be serialized; parallel main pushes would race.
# `cancel-in-progress: false` so an in-flight deploy completes before the
# next one queues.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo xtask test-efficiency-report
      - run: cargo xtask repo-badge-artifacts
      - name: Stage badge JSON for Pages
        run: |
          mkdir -p public/badges
          cp target/ripr/reports/repo-ripr-badge-shields.json public/badges/ripr.json
          cp target/ripr/reports/repo-ripr-plus-badge-shields.json public/badges/ripr-plus.json
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deployment
        uses: actions/deploy-pages@v4
