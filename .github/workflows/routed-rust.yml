name: Routed Rust Small

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' && github.event.action == 'synchronize' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  route:
    name: Route Ripr Rust Small
    runs-on: ubuntu-latest
    outputs:
      router_target: ${{ steps.route.outputs.router_target }}
      router_reason: ${{ steps.route.outputs.router_reason }}
      repo: ${{ steps.route.outputs.repo }}
      workflow: ${{ steps.route.outputs.workflow }}
      run_id: ${{ steps.route.outputs.run_id }}
      runner_query: ${{ steps.route.outputs.runner_query }}
      runner_total: ${{ steps.route.outputs.runner_total }}
      cx43_online: ${{ steps.route.outputs.cx43_online }}
      cx43_idle_ready: ${{ steps.route.outputs.cx43_idle_ready }}
      cpx42_online: ${{ steps.route.outputs.cpx42_online }}
      cpx42_idle_ready: ${{ steps.route.outputs.cpx42_idle_ready }}
      cx53_online: ${{ steps.route.outputs.cx53_online }}
      cx53_idle_ready: ${{ steps.route.outputs.cx53_idle_ready }}
    steps:
      - name: Select runner
        id: route
        env:
          GH_TOKEN: ${{ secrets.EM_RUNNER_READ_TOKEN || github.token }}
          EVENT_NAME: ${{ github.event_name }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name || '' }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          target=github reason=runner_api_failed runner_query=not_attempted runner_total=not_available
          cx43_online=not_available cx43_idle_ready=not_available cpx42_online=not_available cpx42_idle_ready=not_available cx53_online=not_available cx53_idle_ready=not_available
          count() { printf '%s' "$runners" | jq -s "$1"; }
          idle() { printf '%s' "$runners" | jq -s -e --arg model "$1" --arg cap "$2" '[.[].runners[]? | select(.status == "online" and (.busy | not) and ([.labels[].name | ascii_downcase] | index("em-ci") and index($model) and index($cap)))] | length > 0' >/dev/null; }
          if [ "$EVENT_NAME" = "pull_request" ] && [ "$HEAD_REPO" != "$REPOSITORY" ]; then
            reason=fork_or_untrusted_pr runner_query=skipped_untrusted_pr
          elif runners="$(gh api --paginate 'orgs/EffortlessMetrics/actions/runners?per_page=100' 2>/tmp/runners.err)"; then
            runner_query=ok
            runner_total="$(count '[.[].runners[]?] | length')"
            cx43_online="$(count '[.[].runners[]? | select(.status == "online" and ([.labels[].name | ascii_downcase] | index("em-ci") and index("cx43")))] | length')"
            cx43_idle_ready="$(count '[.[].runners[]? | select(.status == "online" and (.busy | not) and ([.labels[].name | ascii_downcase] | index("em-ci") and index("cx43") and index("rust-medium")))] | length')"
            cpx42_online="$(count '[.[].runners[]? | select(.status == "online" and ([.labels[].name | ascii_downcase] | index("em-ci") and index("cpx42")))] | length')"
            cpx42_idle_ready="$(count '[.[].runners[]? | select(.status == "online" and (.busy | not) and ([.labels[].name | ascii_downcase] | index("em-ci") and index("cpx42") and index("rust-16gb")))] | length')"
            cx53_online="$(count '[.[].runners[]? | select(.status == "online" and ([.labels[].name | ascii_downcase] | index("em-ci") and index("cx53")))] | length')"
            cx53_idle_ready="$(count '[.[].runners[]? | select(.status == "online" and (.busy | not) and ([.labels[].name | ascii_downcase] | index("em-ci") and index("cx53") and index("rust-large")))] | length')"
            if idle cx43 rust-medium; then target=cx43 reason=cx43_idle
            elif idle cpx42 rust-16gb; then target=cpx42 reason=cpx42_idle
            elif idle cx53 rust-large; then target=cx53 reason=cx53_idle
            elif [ "$cx43_online$cx43_idle_ready$cpx42_online$cpx42_idle_ready$cx53_online$cx53_idle_ready" != "000000" ]; then reason=runner_capacity_unavailable
            else reason=no_idle_runner
            fi
          else
            runner_query=failed reason=runner_api_failed
          fi
          { echo "router_target=$target"; echo "router_reason=$reason"; repo=$REPOSITORY workflow=routed-rust run_id=$RUN_ID; for name in repo workflow run_id runner_query runner_total cx43_online cx43_idle_ready cpx42_online cpx42_idle_ready cx53_online cx53_idle_ready; do echo "$name=${!name}"; done; } >> "$GITHUB_OUTPUT"
          { echo "### Ripr Rust Small Router"; echo ""; echo "- repo: \`$REPOSITORY\`"; echo "- workflow: \`routed-rust\`"; echo "- run: \`$RUN_ID\`"; echo "- target: \`$target\`"; echo "- reason: \`$reason\`"; for row in "runner query:$runner_query" "visible runners:$runner_total" "cx43 online:$cx43_online" "cx43 idle ready:$cx43_idle_ready" "cpx42 online:$cpx42_online" "cpx42 idle ready:$cpx42_idle_ready" "cx53 online:$cx53_online" "cx53 idle ready:$cx53_idle_ready"; do echo "- ${row%%:*}: \`${row#*:}\`"; done; } >> "$GITHUB_STEP_SUMMARY"

  detect-docs-only:
    name: Detect Docs-Only Surface
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.check.outputs.docs_only }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check whether every changed file is docs/spec/markdown
        id: check
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          docs_only=false
          if [ "$EVENT_NAME" = "pull_request" ] && [ -n "$BASE_SHA" ]; then
            changed="$(git diff --name-only "$BASE_SHA"...HEAD 2>/dev/null || true)"
            if [ -n "$changed" ]; then
              non_docs="$(printf '%s\n' "$changed" | grep -Ev '(^docs/specs/|^docs/handoffs/|\.md$)' || true)"
              release_surface="$(printf '%s\n' "$changed" | grep -E '^(CHANGELOG\.md|Cargo\.toml|Cargo\.lock|crates/ripr/Cargo\.toml)$' || true)"
              if [ -z "$non_docs" ] && [ -z "$release_surface" ]; then
                docs_only=true
              fi
            fi
          fi
          echo "docs_only=$docs_only" >> "$GITHUB_OUTPUT"
          { echo "### Docs-Only Surface Detection"; echo ""; echo "- docs_only: \`$docs_only\`"; } >> "$GITHUB_STEP_SUMMARY"

  rust-cx43:
    name: Ripr Rust Small on CX43
    needs: [route, detect-docs-only]
    if: needs.route.outputs.router_target == 'cx43' && needs.detect-docs-only.outputs.docs_only != 'true'
    runs-on:
      group: em-ci-small
      labels: [self-hosted, linux, x64, em-ci, cx43, rust-medium, trusted-pr]
    env:
      CARGO_BUILD_JOBS: "12"
      CARGO_HOME: /mnt/ci-scratch/cargo-home/${{ github.run_id }}-${{ github.run_attempt }}
      SCCACHE_DIR: /mnt/ci-cache/sccache
      SCCACHE_CACHE_SIZE: 15G
      CARGO_TARGET_DIR: /mnt/ci-scratch/target/${{ github.run_id }}-${{ github.run_attempt }}
      TMPDIR: /mnt/ci-scratch/tmp/${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Prepare toolchain temp
        run: mkdir -p "$TMPDIR"
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.95.0
      - name: Prepare scratch
        run: |
          find /mnt/ci-scratch/cargo-home /mnt/ci-scratch/target /mnt/ci-scratch/tmp -mindepth 1 -maxdepth 1 -mmin +45 -exec rm -rf {} + 2>/dev/null || true
          find /mnt/ci-cache/sccache -type f -mmin +1440 -delete 2>/dev/null || true
          du -sh /mnt/ci-scratch/* /mnt/ci-cache/* /mnt/actions/_work/* /var/log /var/lib/docker /home/* 2>/dev/null | sort -rh | head -20 || true
          df -h / /mnt/ci-scratch 2>/dev/null || true
          ci-disk-guard /mnt/ci-scratch 35
          ci-disk-guard /mnt/ci-cache 20
          mkdir -p "$CARGO_HOME" "$SCCACHE_DIR" "$CARGO_TARGET_DIR" "$TMPDIR"
          df -h /mnt/ci-scratch /mnt/ci-cache || true
          free -h || true
      - name: Required Rust gates
        run: |
          cargo fmt --check
          cargo check --workspace --all-targets
          cargo clippy --workspace --all-targets -- -D warnings
          cargo test --workspace
          cargo xtask check-static-language
          cargo xtask check-no-panic-family
          cargo xtask check-allow-attributes
          cargo xtask check-local-context
          cargo xtask check-file-policy
          cargo xtask check-executable-files
          cargo xtask check-workflows
          cargo xtask check-droid-review-config
          cargo xtask check-spec-format
          cargo xtask check-spec-numbering
          cargo xtask check-fixture-contracts
          cargo xtask check-generated
          cargo xtask check-badge-diff-policy
          cargo xtask check-generated-clean
          cargo xtask check-dependencies
          cargo xtask check-process-policy
          cargo xtask check-network-policy
      - name: Advisory reports
        if: always()
        run: |
          cargo xtask test-efficiency-report || true
          cargo xtask badge-artifacts || true
          cargo xtask pr-summary || true
          cargo xtask receipts || true
          cargo xtask reports index || true
      - name: PR evidence
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          RIPR_REVIEW_COMMENTS_TIMEOUT_SECS: "60"
        run: |
          cargo xtask ripr-pr --base "$BASE_SHA" --head "$HEAD_SHA"
          cargo xtask ripr-pr --base "$BASE_SHA" --head "$HEAD_SHA" --check
          cargo xtask ripr-review-comments --base "$BASE_SHA" --head "$HEAD_SHA"
          cargo xtask ripr-review-comments --base "$BASE_SHA" --head "$HEAD_SHA" --check
          cargo xtask impacted-evidence
          cargo xtask impacted-evidence --check
          cargo xtask ripr-pr-summary
          cargo xtask ripr-pr-summary --check
          cargo xtask ripr-annotations
          cargo xtask ripr-annotations --check
      - name: Proof route dry-run (advisory)
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          cargo xtask proof route --base "$BASE_SHA" --head "$HEAD_SHA" || true
          { echo "### Proof Route (dry-run, advisory)"; echo ""; cat target/ripr/reports/proof-route.md; } >> "$GITHUB_STEP_SUMMARY" || true
      - name: Remove RIPR analysis cache before artifact upload
        if: always()
        run: rm -rf target/ripr/cache
      - name: Upload ripr reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ripr-rust-small-cx43
          path: |
            target/ripr/reports/
            target/ripr/receipts/
            target/ripr/pr/
            target/ripr/review/
            target/xtask/impacted-evidence/
          if-no-files-found: ignore
      - name: Clean scratch
        if: always()
        run: |
          cargo clean || true
          rm -rf "$CARGO_HOME" "$CARGO_TARGET_DIR" "$TMPDIR"
          df -h /mnt/ci-scratch /mnt/ci-cache || true

