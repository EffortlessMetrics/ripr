        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          RIPR_REVIEW_COMMENTS_TIMEOUT_SECS: "60"
        run: |
          cargo xtask ripr-pr --base "$BASE_SHA" --head "$HEAD_SHA"
          cargo xtask ripr-pr --base "$BASE_SHA" --head "$HEAD_SHA" --check
          cargo xtask ripr-review-comments --base "$BASE_SHA" --head "$HEAD_SHA"
          cargo xtask ripr-review-comments --base "$BASE_SHA" --head "$HEAD_SHA" --check
          cargo xtask impacted-evidence
          cargo xtask impacted-evidence --check
          cargo xtask ripr-pr-summary
          cargo xtask ripr-pr-summary --check
          cargo xtask ripr-annotations
          cargo xtask ripr-annotations --check
      - name: Proof route dry-run (advisory)
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          cargo xtask proof route --base "$BASE_SHA" --head "$HEAD_SHA" || true
          { echo "### Proof Route (dry-run, advisory)"; echo ""; cat target/ripr/reports/proof-route.md; } >> "$GITHUB_STEP_SUMMARY" || true
      - name: Remove RIPR analysis cache before artifact upload
        if: always()
        run: rm -rf target/ripr/cache
      - name: Upload ripr reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ripr-rust-small-github
          path: |
            target/ripr/reports/
            target/ripr/receipts/
            target/ripr/pr/
            target/ripr/review/
            target/xtask/impacted-evidence/
          if-no-files-found: ignore

  docs-gate:
    name: Ripr Docs Gate
    needs: [detect-docs-only]
    if: github.event_name == 'pull_request' && needs.detect-docs-only.outputs.docs_only == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.95.0
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ripr-docs-gate
      - name: Doc/spec gates (docs-spec pack required commands)
        run: |
          cargo xtask check-static-language
          cargo xtask check-spec-format
          cargo xtask check-spec-numbering
          cargo xtask check-doc-index
          cargo xtask check-local-context
      - name: Upload docs-gate reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ripr-docs-gate
          path: target/ripr/reports/
          if-no-files-found: ignore

  result:
    name: Ripr Rust Small Result
    needs: [route, detect-docs-only, rust-cx43, rust-cpx42, rust-cx53, rust-github, docs-gate]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summarize routed result
        env:
          TARGET: ${{ needs.route.outputs.router_target }}
          REASON: ${{ needs.route.outputs.router_reason }}
          ROUTE_RESULT: ${{ needs.route.result }}
          CX43_RESULT: ${{ needs.rust-cx43.result }}
          CPX42_RESULT: ${{ needs.rust-cpx42.result }}
          CX53_RESULT: ${{ needs.rust-cx53.result }}
          GITHUB_RESULT: ${{ needs.rust-github.result }}
          RUNNER_QUERY: ${{ needs.route.outputs.runner_query }}
          RUNNER_TOTAL: ${{ needs.route.outputs.runner_total }}
          CX43_ONLINE: ${{ needs.route.outputs.cx43_online }}
          CX43_IDLE_READY: ${{ needs.route.outputs.cx43_idle_ready }}
          CPX42_ONLINE: ${{ needs.route.outputs.cpx42_online }}
          CPX42_IDLE_READY: ${{ needs.route.outputs.cpx42_idle_ready }}
          CX53_ONLINE: ${{ needs.route.outputs.cx53_online }}
          CX53_IDLE_READY: ${{ needs.route.outputs.cx53_idle_ready }}
          EVENT_NAME: ${{ github.event_name }}
          DOCS_ONLY: ${{ needs.detect-docs-only.outputs.docs_only }}
          DOCS_GATE_RESULT: ${{ needs.docs-gate.result }}
        run: |
          status=pass
          message="selected implementation job succeeded"
          if [ "$DOCS_ONLY" = "true" ] && [ "$EVENT_NAME" = "pull_request" ]; then
            if [ "$DOCS_GATE_RESULT" = "success" ]; then
              message="docs-only surface; heavy lanes skipped; docs-gate passed"
            else
              status=fail
              message="docs-gate result was $DOCS_GATE_RESULT on a docs-only PR"
            fi
          elif [ "$ROUTE_RESULT" != "success" ]; then
            status=fail
            message="route job result was $ROUTE_RESULT"
          else
            case "$TARGET" in
              cx43) [ "$CX43_RESULT" = "success" ] || { status=fail; message="CX43 job result was $CX43_RESULT"; } ;;
              cpx42) [ "$CPX42_RESULT" = "success" ] || { status=fail; message="CPX42 job result was $CPX42_RESULT"; } ;;
              cx53) [ "$CX53_RESULT" = "success" ] || { status=fail; message="CX53 job result was $CX53_RESULT"; } ;;
              github) [ "$GITHUB_RESULT" = "success" ] || { status=fail; message="GitHub-hosted job result was $GITHUB_RESULT"; } ;;
              *) status=fail; message="unknown routed target: $TARGET" ;;
            esac
          fi
          echo "### Ripr Rust Small Result" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          for row in "target:$TARGET" "reason:$REASON" "docs_only:$DOCS_ONLY" "docs_gate:$DOCS_GATE_RESULT" "status:$status" "message:$message" "route:$ROUTE_RESULT" "cx43:$CX43_RESULT" "cpx42:$CPX42_RESULT" "cx53:$CX53_RESULT" "github:$GITHUB_RESULT" "runner query:$RUNNER_QUERY" "visible runners:$RUNNER_TOTAL" "cx43 online:$CX43_ONLINE" "cx43 idle ready:$CX43_IDLE_READY" "cpx42 online:$CPX42_ONLINE" "cpx42 idle ready:$CPX42_IDLE_READY" "cx53 online:$CX53_ONLINE" "cx53 idle ready:$CX53_IDLE_READY"; do
            echo "- ${row%%:*}: \`${row#*:}\`" >> "$GITHUB_STEP_SUMMARY"
          done
          [ "$status" = "pass" ]
