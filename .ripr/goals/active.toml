status = "done"
branch = "spec-assistant-loop-health-report"
stackable = false
acceptance = "Define the assistant-loop-health JSON/Markdown contract, explicit inputs, statuses, buckets, warnings, repair queue, advisory limits, and future multi-proof behavior before implementation"
