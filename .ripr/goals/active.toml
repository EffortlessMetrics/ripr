id = "language-adapter-preview"
title = "Language Adapter Preview"
status = "active"

# This is Campaign 27 in `docs/IMPLEMENTATION_CAMPAIGNS.md`.
# Campaign 26 closed PR Inline Comment Publisher (archived under
# `.ripr/goals/archive/2026-05-11-pr-inline-comment-publisher.toml`). This
# campaign introduces a language-neutral analysis adapter boundary inside
# the existing `crates/ripr` package, keeps Rust as the reference adapter,
# and adds syntax-first TypeScript and Python preview adapters that feed
# the same RIPR domain, output, LSP, agent, and Lane 4 review surfaces.

objective = """
Introduce a language-neutral analysis adapter boundary inside the existing
`crates/ripr` package. Keep Rust as the reference adapter. Add syntax-first
TypeScript and Python preview adapters that feed the same RIPR domain,
output, LSP, agent, and Lane 4 review surfaces. The adapter boundary must
preserve current Rust behavior, fixtures, and goldens; the output schema
must gain only additive optional `language` and `language_status` fields;
preview adapters must be opt-in via `[languages]` repo configuration and
labeled `preview` in every public surface; preview adapters must report
explicit static limits instead of guessing; generated CI stays Rust-default
and advisory; Rust analyzer behavior, recommendation ranking, gate
semantics, LSP/editor behavior for Rust seams, mutation execution, provider
behavior, source files, generated tests, branch protection,
`pull_request_target` defaults, and default CI blocking do not change.
"""

end_state = [
  "`LanguageId`, `LanguageAdapter`, `LanguageFacts`, `OwnerFact`, `TestFact`, `AssertionFact`, `RelatedTest`, `FlowSink`, `Probe`, and `StaticLimit` are language-neutral domain or analysis types",
  "Rust fact extraction sits behind `RustAdapter` with no observable fixture, golden, or output schema change",
  "existing reports carry additive optional `language` and `language_status` fields without forking schemas",
  "TypeScript/JavaScript preview adapter emits syntax-first owners, tests, assertions, related tests, probes, and explicit static limits",
  "Python preview adapter emits syntax-first owners, tests, assertions, related tests, probes, and explicit static limits",
  "repo configuration adds `[languages] enabled = [\"rust\"]` as the default, with explicit opt-in to enable preview adapters",
  "VS Code extension language selectors cover Rust plus TypeScript, TypeScript React, JavaScript, JavaScript React, and Python once preview adapters are enabled, without changing saved-workspace defaults",
  "generated GitHub CI groups advisory summaries by language only when `[languages]` declares more than Rust, and Rust-default behavior is unchanged",
  "fixtures and `cargo xtask dogfood` receipts cover at least one TypeScript and one Python preview scenario plus the language router and static-limit cases",
  "the workspace remains one published package, one binary, one library, one LSP server, and one VS Code extension",
]

