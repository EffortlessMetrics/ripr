id = "test-efficiency"
title = "Make low-discriminator tests visible"
status = "active"

objective = """
Make ripr report advisory test-efficiency and likely-vacuity signals from the
same evidence facts used for static exposure findings.
"""

end_state = [
  "per-test evidence ledgers name owners, oracle kind and strength, observed values, and missing discriminator overlap",
  "likely vacuous, smoke-only, broad-oracle, opaque, circular, and duplicative signals are advisory",
  "reports explain evidence and suggested next steps without calling tests bad",
  "test-efficiency metrics are available for trend tracking",
  "agent and editor surfaces can avoid imitating low-discriminator tests",
  "ripr and ripr+ badge artifacts publish unresolved-finding counts as inbox-zero signals",
  "test intent and suppressions are durable, reasoned exception files rather than allowlist entries"
]

