id = "test-oracle-assistant-report-producer"
title = "Test-Oracle Assistant Report Producer"
status = "active"

# This is Campaign 21 in `docs/IMPLEMENTATION_CAMPAIGNS.md`.
# Campaign 20 proved the assistant loop through a spec, canonical replay
# fixture, dogfood receipt, and user workflow docs. This campaign turns that
# proof into a public read-only report producer and optional PR/CI projection.

objective = """
Make the test-oracle assistant loop a concrete report surface: join existing
PR guidance, editor/agent handoff, before/after static evidence, receipts, PR
ledger, optional gate decisions, and optional coverage/grip frontier inputs
into advisory `test-oracle-assistant-proof.{json,md}` artifacts without
rerunning hidden analysis, editing source, generating tests, calling providers,
running mutation testing, or changing default CI blocking.
"""

end_state = [
  "a public read-only command writes `target/ripr/reports/test-oracle-assistant-proof.json` and `.md` from explicit existing artifact paths",
  "the report preserves selected seam identity, missing discriminator, placement state, handoff command, static before/after movement, receipt path, PR ledger path, optional gate path, optional coverage/grip frontier path, warnings, and static limits",
  "fixtures and tests cover complete proof, summary-only guidance, missing optional inputs, missing required inputs, unchanged movement, and advisory limits",
  "generated CI may surface the proof report only as advisory evidence when inputs exist; it must not become pass/fail authority",
  "user docs explain when to read the proof report instead of raw artifact chains",
  "closeout records what is implemented, what remains advisory, and which future work must stay outside analyzer, ranking, gate, editor, or mutation semantics",
]

[[work_item]]
id = "report/test-oracle-assistant-proof"
status = "done"
branch = "report-test-oracle-assistant-proof"
stackable = false
acceptance = "Implement a read-only `ripr assistant-loop proof` report producer that writes advisory JSON and Markdown from explicit Campaign 20 artifact inputs while preserving static vocabulary and advisory limits"
commands = [
  "cargo test -p ripr test_oracle_assistant",
  "cargo xtask check-output-contracts",
  "cargo xtask check-static-language",
  "cargo xtask check-traceability",
  "cargo xtask check-capabilities",
  "cargo xtask check-pr",
]

[[work_item]]
id = "ci/test-oracle-assistant-proof-artifacts"
status = "done"
branch = "ci-test-oracle-assistant-proof-artifacts"
stackable = false
acceptance = "Surface `test-oracle-assistant-proof.{json,md}` in generated GitHub CI as advisory artifacts and summary content only when the required inputs exist, without changing default blocking"
commands = [
  "cargo test -p ripr init_generated_github_workflow",
  "cargo xtask check-workflows",
  "cargo xtask check-output-contracts",
  "cargo xtask check-static-language",
  "cargo xtask check-pr",
]

[[work_item]]
id = "docs/test-oracle-assistant-proof-report"
status = "done"
branch = "docs-test-oracle-assistant-proof-report"
stackable = false
acceptance = "Document how reviewers, maintainers, and coding agents read the proof report, warnings, static movement, optional CI projection, and limits without artifact archaeology"
commands = [
  "cargo xtask check-doc-index",
  "cargo xtask markdown-links",
  "cargo xtask check-static-language",
  "cargo xtask check-pr",
]

[[work_item]]
id = "campaign/test-oracle-assistant-report-closeout"
status = "done"
branch = "campaign-test-oracle-assistant-report-closeout"
stackable = false
acceptance = "Close Campaign 21 after the proof report producer, generated-CI advisory projection, docs, and validation demonstrate a first-class report surface without changing analyzer, gate, editor, or mutation behavior"
commands = [
  "cargo xtask check-spec-format",
  "cargo xtask check-doc-index",
  "cargo xtask markdown-links",
  "cargo xtask check-static-language",
  "cargo xtask check-traceability",
  "cargo xtask check-capabilities",
  "cargo xtask check-output-contracts",
  "cargo xtask check-pr",
]
