id = "ripr-zero-reporting"
title = "RIPR Zero Reporting"
status = "active"

# This is Campaign 18 in `docs/IMPLEMENTATION_CAMPAIGNS.md`.
# Campaign 17 closed RIPR Zero Adoption after baselines became executable
# reviewed debt ledgers with create, diff, shrink-only update, generated-CI
# artifacts, and baseline-ledger docs while generated CI stayed advisory.

objective = """
Make RIPR Zero progress visible as a reporting layer over reviewed baselines,
baseline debt deltas, gate decisions, and recommendation evidence: show repo
RIPR 0 status, baseline age and ownership, stale-debt warnings, trends, and top
repair areas without changing analyzer identity, gate policy, or advisory
defaults.
"""

end_state = [
  "a RIPR Zero reporting spec defines repo-level status, debt trends, baseline metadata, stale warnings, top debt areas, and repair routing without claiming perfect tests or coverage adequacy",
  "baseline ledgers can carry reviewed owner/reason/created/review metadata while preserving compatibility with existing Campaign 17 baseline files",
  "a read-only RIPR Zero status report joins baseline ledgers, baseline debt deltas, gate decisions, and recommendation evidence into JSON/Markdown progress summaries",
  "generated CI can surface RIPR Zero status and top repair areas as advisory evidence without making the report the pass/fail authority",
  "user docs explain how teams read RIPR Zero status, age and refresh baselines, route repair packets, and interpret progress toward RIPR 0",
]

[[work_item]]
id = "spec/ripr-zero-reporting-surface"
status = "done"
branch = "spec-ripr-zero-reporting-surface"
stackable = false
acceptance = "Defined RIPR-SPEC-0017 as the RIPR Zero reporting contract for repo-level status, baseline metadata, stale warnings, trends, top debt areas, and advisory repair routing without analyzer identity rewrites or default CI blocking"
commands = [
  "cargo xtask check-spec-format",
  "cargo xtask check-doc-index",
  "cargo xtask markdown-links",
  "cargo xtask check-static-language",
  "cargo xtask check-traceability",
  "cargo xtask check-capabilities",
  "cargo xtask check-output-contracts",
  "cargo xtask check-pr",
]

