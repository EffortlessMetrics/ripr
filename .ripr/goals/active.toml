id = "modularize-ripr-submodules"
title = "Module SRP Refactoring"
status = "active"

# This is Campaign 6 in `docs/IMPLEMENTATION_CAMPAIGNS.md`.
# Campaign 5B (`operationalization`) closed after the following chain landed:
#
# - #331 config/ripr-config-v1
# - #333 spec/sarif-ci-policy
# - #336 output/sarif-renderer
# - #338 ci/sarif-baseline-policy
# - #342 badge/seam-native-count-mapping
#
# The 5B closeout is intentionally docs/manifest only. It does not change
# analyzer behavior, output schemas, SARIF policy, badge semantics, or LSP
# behavior.

objective = """
Refactor internal modules under crates/ripr/src so each module has one
product responsibility, improving maintainability, testability, and reasoning
without splitting the package. Start by auditing the old Campaign 6 draft stack
against the now-closed operationalization surface before merging structural PRs.
"""

end_state = [
  "Every internal module has a single, clear product responsibility",
  "Module boundaries align with RIPR analysis stages and rendering surfaces",
  "analysis/mod.rs is a thin orchestration facade, not implementation",
  "app.rs and CLI command handling are easier to reason about without public API drift",
  "LSP, SARIF, badge, context, and calibration surfaces remain behaviorally stable through refactors",
  "Public package shape stays one crate and one binary; no ripr-core/ripr-cli/ripr-lsp split",
  "Architecture and public API guards pass without output schema churn"
]

