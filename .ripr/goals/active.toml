id = "calibrated-gate-policy"
title = "Calibrated Gate Policy"
status = "active"

# This is Campaign 15 in `docs/IMPLEMENTATION_CAMPAIGNS.md`.
# Campaign 14 closed Recommendation Calibration after the spec, fixture corpus,
# outcome receipts, advisory report, workflow docs, and closeout handoff landed.

objective = """
Define the optional calibrated gate layer for PR-time test-oracle evidence:
separate visibility from blocking, fail only under explicit policy, preserve
waiver and acknowledgement paths, and use runtime mutation calibration only as
imported confidence evidence.
"""

end_state = [
  "a gate policy spec defines inputs, outputs, modes, acknowledgement labels, calibration evidence, and non-goals before implementation",
  "a read-only gate evaluator consumes existing PR guidance, repo exposure, SARIF policy, suppressions, labels, recommendation calibration, and optional mutation calibration reports",
  "default generated workflows remain advisory and non-blocking unless an explicit gate mode is configured",
  "blocking decisions are deterministic, narrow, auditable, and limited to calibrated high-confidence new gaps",
  "waiver labels such as `ripr-waive` produce visible acknowledged outcomes, not silent success",
  "fixtures pin advisory, acknowledged, fail-on-new-high-confidence-gap, baseline-check, suppression, and calibration agreement/disagreement cases",
  "docs explain visibility versus gating and keep static evidence vocabulary separate from runtime mutation outcomes",
]

