id = "ripr-zero-adoption"
title = "RIPR Zero Adoption"
status = "active"

# This is Campaign 17 in `docs/IMPLEMENTATION_CAMPAIGNS.md`.
# Campaign 16 closed Gate Adoption UX after generated-CI examples, waiver
# workflows, baseline guidance, summary polish, dogfood receipts, and
# blocking-readiness docs made optional gates adoptable while generated CI
# stayed advisory by default.

objective = """
Make RIPR 0 adoption concrete for PR/CI users: turn baselines into visible
burn-down ledgers, surface PR-level behavioral-debt deltas, route blocking
candidates to focused repair packets, and keep every new policy mode explicit
and advisory by default.
"""

end_state = [
  "a baseline debt delta report compares current evidence against reviewed baseline debt without auto-adopting new findings",
  "generated CI summaries show new, resolved, acknowledged, suppressed, stale, and unknown baseline-delta counts before artifact digging",
  "blocking summaries link each policy candidate to a focused test shape, related test, verify command, acknowledgement path, and full receipt",
  "RIPR Zero adoption docs explain that RIPR 0 is configured-scope behavioral grip closure, not perfect tests or 100 percent coverage",
  "coverage/grip frontier summaries are available when coverage data exists without treating coverage as a proxy for oracle strength",
  "adoption remains staged: advisory visibility, baseline checkpoint, visible-only gate, acknowledgeable gate, baseline-check, calibrated-gate, then burn-down toward RIPR 0",
]

[[work_item]]
id = "spec/baseline-debt-delta-report"
status = "ready"
branch = "spec-baseline-debt-delta-report"
stackable = false
acceptance = "Define the baseline debt delta report contract for comparing current PR/CI evidence to reviewed baseline debt without changing analyzer identity, auto-adopting new debt, or making CI blocking by default"
commands = [
  "cargo xtask check-spec-format",
  "cargo xtask check-doc-index",
  "cargo xtask markdown-links",
  "cargo xtask check-static-language",
  "cargo xtask check-traceability",
  "cargo xtask check-capabilities",
  "cargo xtask check-output-contracts",
  "cargo xtask check-pr",
]

