id = "recommendation-calibration"
title = "Recommendation Calibration"
status = "active"

# This is Campaign 14 in `docs/IMPLEMENTATION_CAMPAIGNS.md`.
# Campaign 13 closed PR Review Guidance after static evidence became visible in
# generated CI summaries, check annotations, fixtures, and docs while staying
# advisory/non-blocking by default.

objective = """
Move RIPR from a complete static evidence loop to measured recommendation
quality: determine whether PR-time guidance is useful, correctly placed,
properly suppressed or capped, and correlated with improved static evidence
after one focused test.
"""

end_state = [
  "a PR-shaped calibration corpus records useful, noisy, wrong-line, already-covered, summary-only, suppression, generated/migration, macro-heavy, trait/generic, and async/error-boundary cases",
  "review guidance outcome receipts can record recommendation outcomes without telemetry, external services, source edits, generated tests, or runtime mutation execution",
  "recommendation calibration reports measure top recommendation usefulness, false annotations, summary-only fallback correctness, suppression correctness, recommended test target correctness, and review-comment latency",
  "generated CI remains advisory and non-blocking while surfacing calibration artifacts when available",
  "calibration results feed future ranking and policy decisions without opaque scores or runtime adequacy claims"
]

