# Selected on 2026-06-05 after live queue inspection closed the current
# dangling analysis PR (#982) and `cargo xtask goals next` reported
# `no_current_goal = true`.
id = "cross-language-evidence-router-ux"
title = "Cross-Language Evidence Router UX"
status = "active"
lane = "lane1"
issue = "https://github.com/EffortlessMetrics/ripr-swarm/issues/908"

objective = """
Turn the calibrated TypeScript/Bun graph path into a repeatable mixed
TypeScript plus Rust operating loop for Bun operators and external coding
agents, while preserving preview/advisory authority and preventing unresolved
cross-language evidence from becoming public repair packets.
"""

end_state = [
  "Bun operators can read compact cross-language preview state without inspecting raw preview-card JSON",
  "configured advisory packets bound agent work and stop when bridge or placement evidence is missing",
  "proof-mode projection keeps static witnesses distinct from runtime, mutation, Miri, or model proof",
  "manifest-only stable-byte profiles make future bridge debt visible before analyzer behavior changes",
  "bridge inventory and dogfood receipts expose calibrated, missing, mention-only, bridge-unknown, and named limitation states",
  "the campaign closes with TypeScript/Bun support still preview/advisory unless a separate accepted promotion contract changes that boundary",
]

hard_rules = [
  "do not force actionability from cross-language preview evidence",
  "do not create public repair packets from preview or limitation evidence",
  "do not suggest Rust or external-language test targets without explicit bridge, observer, and typed placement evidence",
  "do not add or require a ripr check --profile flag",
  "do not run tsc, tsserver, Bun, Jest, Vitest, Miri, mutation engines, providers, or generated tests",
  "do not change gates, badges, baselines, RIPR Zero, support tiers, source release, publishing, signing, marketplace, or install-doc behavior",
  "source ripr remains release, signing, publishing, and distribution authority",
]

non_goals = [
  "no stable TypeScript or JavaScript support claim",
  "no full Bun binding graph",
  "no generic cross-language support for every mixed-language repository",
  "no runtime execution or UB proof claim",
  "no generated tests",
  "no provider integration",
  "no autonomous edits",
  "no public repair packets from preview cross-language evidence",
  "no source release, publish, tag, signing, marketplace, or install-doc work without explicit release authorization",
]

