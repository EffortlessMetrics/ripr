id = "lane1-post-08-operating-loop"
title = "Lane 1 Post-0.8 Evidence-To-Repair Operating Loop"
status = "active"
lane = "lane1"
issue = "https://github.com/EffortlessMetrics/ripr-swarm/issues/908"
no_current_goal = false

# Selected after the 0.8.0 evidence-to-repair foundation shipped and the
# language-aware placement, large-repo runtime, and real-repo trust campaigns
# closed. Live repo state on 2026-06-03 shows #913, #912, and #909 are closed,
# while #908 and #910 remain open as mixed-language real-repo trust follow-ups.
# Normal development remains in ripr-swarm; source ripr remains release,
# signing, publishing, and distribution authority.

objective = """
Make RIPR's post-0.8 Lane 1 operating loop useful on real large and
mixed-language repositories: produce actionable repair packets only when they
are safe to delegate, verify, receipt, and measure, and otherwise produce
named limitation backlog items with samples, unlock conditions, analyzer
routes, and non-claims.
"""

end_state = [
  "review, CLI, LSP, PR, badge, and CI surfaces project canonical repair or limitation state instead of raw finding counts",
  "large-repo runs preserve full, diff-complete, sampled, stale, timeout, incomplete, runner-failure, and cache-limited status without silent degradation",
  "cross-language, binding, FFI, and external-oracle cases fail closed until explicit graph and target evidence exists",
  "repair packets name canonical_gap_id, repair_kind, target shape, verify command, receipt command, allowed edit surface, must-not-change boundaries, confidence, and raw evidence refs",
  "attempt receipts and route-quality reports show improved, unchanged, regressed, resolved, missing-receipt, and limitation-route movement without curating only wins",
]

hard_rules = [
  "do not force actionability",
  "do not suggest wrong-language or unrelated test files",
  "do not silently skip cache or full-repo limitations",
  "do not treat raw findings as product truth",
  "do not create public repair packets from preview or limitation evidence",
  "do not add provider integration, autonomous edits, mutation execution, or a default blocking CI or badge semantic switch",
  "do not claim 0.8.0 on crates.io includes post-release swarm fixes",
]

non_goals = [
  "no provider integration",
  "no autonomous edits",
  "no mutation execution",
  "no default blocking CI or badge semantic switch",
  "no source release, publish, tag, signing, marketplace, or install-doc work without explicit release authorization",
]

