id = "baseline/metadata-v2"
status = "done"
branch = "baseline-metadata-v2"
stackable = false
acceptance = "Extended baseline create, diff, and shrink-only update handling so optional owner, reason, created_at, review_after, and source metadata are preserved and reported without breaking existing Campaign 17 baseline files"
commands = [
  "cargo test -p ripr baseline",
  "cargo xtask check-output-contracts",
  "cargo xtask check-static-language",
  "cargo xtask check-pr",
]

