# Selected after Lane 1 Language-Aware Placement Navigation closed with
# `no_current_goal = true`. Live repo state on 2026-06-03 shows #910 remains
# open as the concrete TS discriminator plus binding/FFI reachability
# requirement, while #908 remains the broader cross-language oracle visibility
# and wrong-language remediation issue. This campaign may make configured
# external oracle routes more precise, but it must not promote preview evidence
# into public repair packets until the full Rust seam -> binding/FFI edge ->
# external callsite -> external oracle chain and repair-packet fields are
# present.

objective = """
Make cross-language oracle visibility explicit for Rust seams exercised by
TypeScript, binding, or FFI surfaces: distinguish missing external
discriminators, unknown bridge routes, and complete advisory witnesses, then
only move toward actionability when the Rust seam, binding edge, external
callsite, external assertion/oracle, verify command, receipt command, raw
evidence refs, and edit constraints are all named.
"""

end_state = [
  "TS-tested Rust seam samples carry a bounded oracle graph shape: Rust seam, boundary, binding or FFI edge, external callsite, external assertion or oracle, and raw evidence refs",
  "complete configured external witnesses can be reported as advisory external observation without creating public repair packets, generated tests, gates, badges, baselines, or support-tier promotion",
  "missing discriminator, mention-only, unknown bridge, and unresolved target cases stay static limitations with named repair routes and samples",
  "readiness, scorecard, review, LSP, and PR surfaces preserve cross-language oracle routes as limitations until public repair-packet fields exist",
  "full actionability remains blocked unless verify_command, receipt_command, allowed_edit_surface, must_not_change, confidence, and raw_evidence_refs are present",
]

hard_rules = [
  "do not classify TS-tested Rust seams as actionable from preview evidence alone",
  "do not suggest Rust or external-language test targets without explicit bridge and observer evidence",
  "do not invent binding edges, external callsites, external oracles, verify commands, receipt commands, candidate values, or allowed edit surfaces",
  "do not create public repair packets from advisory cross-language witnesses",
  "do not claim full cross-language oracle graph proof or runtime coverage proof until the graph is explicitly named and verified",
  "do not claim 0.8.0 on crates.io includes post-release swarm fixes",
  "source ripr remains release, signing, publishing, and distribution authority",
]

non_goals = [
  "no provider integration",
  "no autonomous edits",
  "no mutation execution",
  "no default blocking CI or badge semantic switch",
  "no generated tests",
  "no support-tier promotion for TypeScript or JavaScript preview evidence",
  "no source release, publish, tag, signing, marketplace, or install-doc work without explicit release authorization",
]

