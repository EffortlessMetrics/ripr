title = "Test-Oracle Assistant Proof"
status = "active"

# This is Campaign 20 in `docs/IMPLEMENTATION_CAMPAIGNS.md`.
# Campaign 19 closed PR Evidence Ledger after PR movement history,
# waiver aging, baseline burn-down, repair receipts, coverage/grip frontier
# signals, generated-CI projection, and workflow docs landed while generated
# CI stayed advisory.

objective = """
Prove the full PR-time test-oracle assistant loop: changed Rust behavior flows
through static evidence, PR/editor guidance, a bounded focused-test handoff,
before/after verification, receipt, and advisory CI/ledger projection without
changing analyzer semantics, recommendation ranking, gate policy, LSP behavior,
or default CI blocking.
"""

end_state = [
  "a spec defines the end-to-end proof contract from diff evidence through recommendation, handoff packet, focused-test repair, after-evidence, receipt, and advisory PR/CI projection",
  "a canonical review-loop fixture pins one changed-behavior case across before evidence, top recommendation, related test, focused test shape, after evidence, receipt, and ledger projection expectations",
  "a dogfood receipt proves the current repo can trace one seam through PR guidance, editor/agent packet surfaces, verification commands, receipts, and advisory CI artifacts without artifact archaeology",
  "user docs explain the PR-time assistant workflow without requiring users to learn cockpit or internal report topology first",
  "closeout records which parts of the loop are verified, which remain advisory, and which future work must not blur static evidence with runtime mutation confirmation",
]

