acceptance = "ripr-config-v1 covers analysis mode, oracle policy, severity, and seam-diagnostics defaults; configured rules apply across CLI, LSP, and reports; existing flags continue to work; documented in docs/OUTPUT_SCHEMA.md and docs/CAPABILITY_MATRIX.md"
commands = [
  "cargo xtask shape",
  "cargo xtask fix-pr",
  "cargo xtask check-pr",
  "cargo xtask check-output-contracts"
]

