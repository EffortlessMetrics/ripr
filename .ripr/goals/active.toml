id = "editor-evidence-ux"
title = "Editor Evidence UX"
status = "active"

# This is Campaign 17 in `docs/IMPLEMENTATION_CAMPAIGNS.md`.
# Campaign 16 closed Gate Adoption UX after adoption examples, waiver workflows,
# baseline guidance, CI summary polish, dogfood receipts, and
# blocking-readiness guidance landed while generated CI stayed advisory by
# default.

objective = """
Make RIPR's saved-workspace LSP path project one evidence spine from diagnostic
to hover, related test, focused context packet, one test, verify, and receipt
without automatic edits, generated tests, runtime mutation execution, or runtime
adequacy claims.
"""

end_state = [
  "diagnostics carry stable seam identity and are not reinterpreted from message text",
  "hover is the primary human explanation surface for seam class, evidence path, missing observation, related test, suggested assertion shape, verify command, receipt command, and static limits",
  "code actions appear only when the supporting evidence or command context exists",
  "a canonical evidence context packet command gives external agents one bounded work packet without coupling RIPR to an LLM provider",
  "protocol-level and VS Code smoke tests prove the editor loop from server startup through diagnostics, hover, actions, copy payloads, related-test opening, and restart/error paths",
  "status and staleness make stale, failed, disabled, or unavailable evidence visible rather than presenting it as fresh",
  "user-facing docs describe the saved-workspace editor workflow and its limits",
]

[[work_item]]
id = "campaign/editor-evidence-ux-audit"
status = "ready"
branch = "docs-editor-evidence-ux-audit"
stackable = false
acceptance = "Audit diagnostic data, hover, actions, context collection, VS Code extension proof, and LSP cockpit status into one editor evidence contract without behavior changes"
commands = [
  "cargo xtask check-campaign",
  "cargo xtask goals next",
  "cargo xtask check-doc-index",
  "cargo xtask check-static-language",
  "cargo xtask check-traceability",
  "cargo xtask check-capabilities",
  "cargo xtask check-pr",
]

