id = "lane1-cross-language-oracle-followup"
title = "Lane 1 Cross-Language Oracle Follow-Up"
status = "active"
lane = "lane1"
issue = "https://github.com/EffortlessMetrics/ripr-swarm/issues/910"
no_current_goal = false

# Selected after the Lane 1 post-0.8 operating loop closed with
# no_current_goal = true. Live repo state on 2026-06-04 shows #913, #911,
# #912, and #909 closed, while #908 and #910 remain open as broader
# mixed-language oracle follow-ups. This successor must extend cross-language
# oracle evidence only through measured, profile-backed graph slices and must
# keep preview/advisory and fail-closed boundaries explicit.

objective = """
Make #908/#910 cross-language oracle follow-ups more useful by adding measured
graph profiles beyond the bounded Bun Blob route while preserving the rule that
external-language evidence is advisory or a named limitation until every graph
leg and public repair-packet field is explicit.
"""

end_state = [
  "non-Blob Rust seams exercised through TypeScript, binding, or FFI routes have profile-backed samples instead of generic weak-grip repair guidance",
  "missing binding, FFI, external callsite, external oracle, or target-placement legs remain named static limitations with source locations and unlock conditions",
  "complete external witnesses remain preview/advisory until canonical actionability fields exist",
  "public repair queues, LSP actions, badges, CI, and PR/review surfaces do not project cross-language limitations as repair packets",
]

hard_rules = [
  "do not force actionability",
  "do not suggest wrong-language or unrelated test files",
  "do not create public repair packets from preview or limitation evidence",
  "do not claim generic cross-language oracle proof from one configured profile",
  "do not add provider integration, autonomous edits, mutation execution, or a default blocking CI or badge semantic switch",
  "source ripr remains release, signing, publishing, and distribution authority",
]

non_goals = [
  "no generic TypeScript or Bun runtime execution",
  "no generated tests",
  "no provider integration",
  "no autonomous edits",
  "no mutation execution",
  "no default blocking CI or badge semantic switch",
  "no source release, publish, tag, signing, marketplace, or install-doc work without explicit release authorization",
]

