  "ci/unified-pr-summary-card",
]
acceptance = "Pin generated workflow or summary fixtures for advisory-only, summary-only guidance, assistant-proof present, assistant-proof missing, acknowledged, blocked, baseline-resolved, coverage-flat/grip-improved, and config-error PR summary states"
commands = [
