stackable = false
acceptance = "Define the advisory assistant loop health report contract, including inputs, proof counts, completeness, evidence movement, warnings, missing inputs, top files, next repair queue, and limits"
commands = [
  "cargo xtask check-spec-format",
  "cargo xtask check-output-contracts",
  "cargo xtask check-doc-index",
  "cargo xtask markdown-links",
  "cargo xtask check-static-language",
  "cargo xtask check-traceability",
