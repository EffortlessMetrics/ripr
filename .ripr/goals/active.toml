id = "pr-evidence-ledger"
title = "PR Evidence Ledger"
status = "active"

# This is Campaign 19 in `docs/IMPLEMENTATION_CAMPAIGNS.md`.
# Campaign 18 closed RIPR Zero Reporting after repo-level status, baseline
# metadata health, stale-debt warnings, trends, top repair areas, generated-CI
# projection, and user workflow docs landed while generated CI stayed advisory.

objective = """
Turn PR-time RIPR evidence into a durable adoption ledger: record per-PR
behavioral grip movement, waiver and suppression visibility, baseline burn-down,
repair receipts, and coverage/grip frontier signals without changing analyzer
identity, gate policy, recommendation ranking, or advisory defaults.
"""

end_state = [
  "a PR evidence ledger spec defines append-only PR movement records for new policy-eligible gaps, resolved baseline debt, acknowledgements, suppressions, gate mode, repair receipts, and optional coverage/grip signals",
  "a read-only PR evidence ledger report writes JSON/Markdown from existing gate decisions, baseline debt deltas, RIPR Zero status, recommendation calibration, outcome receipts, and optional coverage data",
  "generated CI can upload and summarize the PR evidence ledger as advisory history while leaving gate decisions as the pass/fail authority",
  "coverage/grip frontier reporting makes execution coverage and behavioral grip movement visible as separate axes without treating coverage as adequacy",
  "user docs explain how teams use PR evidence ledgers for waiver aging, baseline burn-down, repair routing, and movement toward RIPR 0",
]

