id = "ripr-zero-evidence"
title = "RIPR Zero Evidence"
status = "active"

# This is Campaign 17 in `docs/IMPLEMENTATION_CAMPAIGNS.md`.
# Campaign 16 closed Gate Adoption UX after optional gate adoption examples,
# waiver workflows, baseline guidance, CI summary polish, dogfood receipts, and
# blocking-readiness guidance landed while generated workflows stayed advisory
# by default.

objective = """
Turn large raw RIPR repo scores into canonical, actionable, verifiable
burn-down evidence so teams can preserve honest visibility, baseline existing
debt, block only new policy-eligible regressions, and make measurable progress
toward RIPR 0 under configured scope.
"""

end_state = [
  "raw RIPR gaps are decomposed into canonical, actionable, static-limitation, baseline-known, suppressed, and calibrated-confidence buckets",
  "every actionable gap has a focused test or assertion-upgrade path with a missing discriminator, candidate value, assertion shape, related test, or verification command",
  "top burn-down tasks are ranked by expected raw and canonical RIPR delta",
  "before/after evidence movement verifies whether a focused test improved, regressed, resolved, or failed to move seam evidence",
  "coverage/grip frontier reporting shows behavioral grip movement separately from line coverage",
  "imported runtime calibration can support or lower confidence without running mutation tests or changing static vocabulary",
]

