id = "pr-review-guidance"
title = "PR Review Guidance"
status = "active"

# This is Campaign 13 in `docs/IMPLEMENTATION_CAMPAIGNS.md`.
# Campaign 12 closed the First-Hour UX lane after the editor and generated CI
# first screens became useful without report archaeology.

objective = """
Project the existing static evidence loop into bounded pull-request review
guidance: changed seam -> focused test intent -> verification command -> review
artifact, without turning RIPR into a free-form reviewer or CI blocker.
"""

end_state = [
  "ripr review-comments writes target/ripr/review/comments.json and comments.md as read-only advisory reports",
  "review guidance only places line annotations on changed lines and falls back to summary-only recommendations otherwise",
  "guidance is capped, deterministic, deduplicated, and rooted in existing repo exposure, agent packet, agent brief, related-test, severity, and suppression evidence",
  "generated GitHub workflows run the report producer before consuming target/ripr/review/comments.json for summaries and check annotations",
  "inline PR comments remain opt-in and are not posted by default",
  "fixtures pin exact-line, owner-function-line, same-file-line, summary-only, capped, suppressed, and changed-test skip cases",
  "docs explain PR guidance as advisory static evidence, not LLM review, runtime mutation proof, automatic edits, generated tests, or default CI blocking"
]

[[work_item]]
id = "campaign/pr-review-guidance-audit"
status = "done"
branch = "campaign-pr-review-guidance-audit"
stackable = false
requires_human_merge = true
acceptance = "Audit the long-term static-evidence control-plane objective against current artifacts, identify the missing PR review producer, and open Campaign 13 with the renderer as the next ready item"
commands = [
  "cargo xtask check-campaign",
  "cargo xtask goals next",
  "cargo xtask check-doc-index",
  "cargo xtask markdown-links",
  "cargo xtask check-static-language",
  "cargo xtask check-capabilities",
  "cargo xtask check-pr"
]

