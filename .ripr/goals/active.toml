id = "llm-work-loop"
title = "LLM Work Loop"
status = "active"

# This is Campaign 11 in `docs/IMPLEMENTATION_CAMPAIGNS.md`.
# Campaign 10 (`editor-agent-integration`) closed after the saved-workspace
# editor loop, agent CLI loop, cockpit, CI artifacts, docs, and release proof
# were aligned.

objective = """
Make the completed editor-agent loop stateful, deterministic, and useful to LLM
agents under review pressure: status to task packet to edit target to verify to
receipt to reviewer summary.
"""

end_state = [
  "An agent can inspect current loop state without rerunning analysis or reading chat history",
  "Loop commands, artifact paths, and review receipts are centralized enough that CLI, LSP, cockpit, CI, docs, and fixtures do not drift",
  "Receipts carry enough provenance and next-action guidance for reviewers to trust the static handoff",
  "Canonical fixtures pin happy, unchanged, regressed, missing-artifact, stale-artifact, configured-off, path-with-spaces, and Windows-separator loop cases",
  "Generated CI uploads LLM work-loop status, workflow, review summary, receipt, and cockpit artifacts as advisory evidence"
]

[[work_item]]
id = "agent/loop-status-report"
status = "done"
branch = "agent-loop-status-report"
stackable = false
requires_human_merge = true
acceptance = "Add `ripr agent status --root . --json` as a read-only artifact status report for before snapshot, after snapshot, agent brief, agent packet, agent verify, and agent receipt, with recoverable seam_id, missing-input commands, and stale-looking warnings"
commands = [
  "cargo test -p ripr agent_status",
  "cargo xtask check-output-contracts",
  "cargo xtask check-static-language",
  "cargo xtask check-pr"
]

