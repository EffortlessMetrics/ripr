stackable = false
acceptance = "Define the baseline debt delta report contract for comparing current PR/CI evidence to reviewed baseline debt without changing analyzer identity, auto-adopting new debt, or making CI blocking by default"
commands = [
  "cargo xtask check-spec-format",
  "cargo xtask check-doc-index",
  "cargo xtask markdown-links",
  "cargo xtask check-static-language",
