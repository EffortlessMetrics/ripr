id = "runtime-calibration-fixtures"
title = "Runtime Calibration Fixture Expansion"
status = "active"

# This is Campaign 8 in `docs/IMPLEMENTATION_CAMPAIGNS.md`.
# Campaign 7 (`defaults-first-operator-adoption`) closed after the
# install-to-targeted-test loop was documented, fixture-backed, and verified
# through the CLI, editor, CI, release, and report surfaces. The next lane
# keeps runtime mutation data explicit and supplied; RIPR still does not run
# mutation tests.

objective = """
Expand the calibration fixture lane so RIPR can compare static test-grip
evidence with supplied cargo-mutants results across representative agreement
buckets without turning RIPR into a mutation runner.
"""

end_state = [
  "Calibration fixtures cover static gaps with runtime signals and static gaps without runtime signals",
  "Calibration fixtures cover runtime signals without static gaps, ambiguous file/line joins, and unmatched runtime data",
  "Every runtime artifact is supplied input or generated calibration output; RIPR does not run mutation tests",
  "Operator cockpit and docs show calibration as optional advisory context",
  "Static output vocabulary remains unchanged outside explicit calibration reports"
]

[[work_item]]
id = "calibration/runtime-fixtures-v1"
status = "done"
branch = "runtime-calibration-fixtures"
stackable = false
requires_human_merge = true
acceptance = "Controlled calibration fixtures exercise the main static/runtime agreement buckets with supplied cargo-mutants data, checked expected reports, and no mutation execution by RIPR"
commands = [
  "cargo test -p ripr calibration",
  "cargo xtask mutation-calibration fixtures/boundary_gap/input --mutants-json fixtures/boundary_gap/calibration/runtime-fixtures-v1/runtime-mutants.json --repo-exposure-json fixtures/boundary_gap/calibration/runtime-fixtures-v1/repo-exposure.json",
  "cargo xtask check-output-contracts",
  "cargo xtask check-static-language",
  "cargo xtask check-campaign",
  "cargo xtask goals next",
  "cargo xtask check-fixture-contracts",
  "cargo xtask check-traceability",
  "cargo xtask check-capabilities",
  "cargo test --workspace"
]

