id = "repo-seam-inventory-test-grip"
title = "Repo Seam Inventory and Test Grip"
status = "active"

# This is Campaign 4B in `docs/IMPLEMENTATION_CAMPAIGNS.md`. It
# replaces the original Campaign 4 (Editor and Agent Loop) work
# items with seam-aware shapes; it also subsumes Campaign 5's
# `cache/persistent-cache-v1` and `calibration/cargo-mutants-scaffold`
# as `cache/repo-seam-facts-v1` and `calibration/cargo-mutants-v1`
# below. Campaign 5 retains its broader operationalization scope
# (`config/ripr-config-v1`, `ci/sarif-ci-policy`).

objective = """
Inventory behavior seams across the repo, classify how strongly current
tests grip each seam through RIPR evidence, and turn actionable gaps
into editor diagnostics and agent-ready test packets. The Voice A
baseline (currently-probeable production syntax shapes) becomes a
special case of seam classification rather than the analyzer's only
mode.
"""

end_state = [
  "RepoSeam, SeamKind, RequiredDiscriminator, and SeamGripClass exist as a first-class data model",
  "seam IDs are stable across runs and across input file walk reorderings",
  "test-grip evidence per seam covers reach, activate/infect, propagate, observe, discriminate",
  "test-grip classification uses a separate SeamGripClass; mapping to existing ExposureClass and to badge counts is explicit, not implicit through type extension",
  "a repo exposure report enumerates seams with their grip class and missing-discriminator hypothesis",
  "LSP diagnostics surface ungripped or under-gripped seams in the editor",
  "hover renders the RIPR evidence path that produced the classification, with cited related tests",
  "agent context packets contain the load-bearing fields a coding agent needs to write the missing test",
  "public repo badge counts can be derived from seam classification without breaking the existing schema",
  "static-language constraints hold: runtime-mutation outcome vocabulary is forbidden in static output (per docs/LEARNINGS.md § Static Language)",
  "Voice B does not claim mutation-test outcomes from static evidence; runtime mutation testing remains a separate confirmation step"
]

# Pre-4B LSP groundwork (merged before Campaign 4B seam work)
#
# These PRs built editor/agent surfaces on the current Finding / AnalysisSnapshot
# model. They are not seam-native, but they protect the LSP loop and provide
# fallback behavior while Campaign 4B types are being designed.
#
# - PR #211: evidence-rich hover over current Finding / AnalysisSnapshot.
#   Replaced generic "evidence found" text with real StageEvidence.summary,
#   added related-test oracle text and weakness rendering.
# - PR #218: LSP executeCommand ripr.collectContext.
#   Added executeCommand provider, server-side context packet lookup from
#   latest_analysis, and VS Code LSP-first / CLI-fallback copyContext path.
# - PR #219: VS Code extension smoke tests.
#   Added @vscode/test-electron e2e tests for activation, command registration,
#   copyContext, and restartServer; wired CI xvfb-run step.
#
# Campaign 4B LSP work (lsp/repo-seam-diagnostics-v1, lsp/seam-evidence-hover-v1,
# context/agent-seam-packets-v1) will extend or revise these surfaces for
# RepoSeam / SeamGripClass.

