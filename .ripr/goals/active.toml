id = "pr-summary-front-panel"
title = "PR Summary Front Panel"
status = "active"

# This is Campaign 22 in `docs/IMPLEMENTATION_CAMPAIGNS.md`.
# Campaign 21 turned the proved assistant loop into a public read-only proof
# report and optional generated-CI projection. This campaign makes the GitHub
# job summary the reviewer-grade front panel over the existing report stack.

objective = """
Make the generated GitHub job summary a reviewer-grade RIPR PR Review surface:
join existing PR guidance, assistant proof, gate decision, baseline debt delta,
RIPR Zero status, PR evidence ledger, coverage/grip frontier, and repair-route
signals into one advisory first-screen summary without changing analyzer
semantics, recommendation ranking, gate policy, editor behavior, inline comment
posting, or default CI blocking.
"""

end_state = [
  "generated CI renders one RIPR PR Review summary card from existing artifacts before users need to inspect raw JSON or download the full artifact packet",
  "the summary shows top issue, missing discriminator, suggested focused test, related test, proof and receipt availability, gate mode/status, baseline movement, PR ledger movement, coverage/grip movement, warnings, and next action when those inputs exist",
  "the summary preserves advisory defaults and leaves `ripr gate evaluate` as the only explicit pass/fail authority when configured",
  "fixtures or generated-workflow tests pin advisory-only, summary-only guidance, proof-present, proof-missing, acknowledged, blocked, baseline-resolved, coverage-flat/grip-improved, and config-error summary behavior",
  "docs explain how reviewers, developers, maintainers, and coding agents should read the front panel before drilling into artifacts",
  "closeout records what became first-screen PR/CI UX and which future work must stay outside analyzer, ranking, gate, editor, mutation, provider, generated-test, inline-comment, and default-blocking behavior",
]

[[work_item]]
id = "ci/unified-pr-summary-card"
status = "ready"
branch = "ci-unified-pr-summary-card"
stackable = false
acceptance = "Render a unified RIPR PR Review summary card in generated GitHub CI from existing PR guidance, gate, baseline, RIPR Zero, PR ledger, assistant proof, and coverage/grip artifacts while preserving advisory defaults and gate-only pass/fail authority"
commands = [
  "cargo test -p ripr init_generated_github_workflow",
  "cargo xtask check-workflows",
  "cargo xtask check-output-contracts",
  "cargo xtask check-static-language",
  "cargo xtask check-pr",
]

[[work_item]]
id = "test/ci-pr-summary-front-panel-fixtures"
status = "blocked"
branch = "test-ci-pr-summary-front-panel-fixtures"
stackable = false
