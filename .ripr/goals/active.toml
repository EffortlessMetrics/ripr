commands = [
  "cargo xtask markdown-links",
  "cargo xtask check-doc-index",
  "cargo xtask check-static-language",
  "cargo xtask check-campaign",
  "cargo xtask goals next",
  "cargo xtask check-pr"
]

[[work_item]]
id = "release/0-4-0-prep"
status = "blocked"
branch = "release-0-4-0-prep"
stackable = false
requires_human_merge = true
blocked_by = ["release/readiness-report", "examples/real-repo-pilot-receipts", "docs/0-4-landing-path"]
blocked_reason = "Wait for readiness, dogfood receipts, and landing docs before changing versioned release artifacts."
acceptance = "Prepare 0.4.0 only after readiness and dogfood receipts exist, with crate, install, VSIX, release-doc, and marketplace proof"
commands = [
  "cargo package -p ripr --list",
  "cargo publish -p ripr --dry-run",
  "cargo xtask check-pr"
