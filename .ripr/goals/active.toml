id = "editor-agent-integration"
title = "Editor Agent Integration"
status = "active"

# This is Campaign 10 in `docs/IMPLEMENTATION_CAMPAIGNS.md`.
# Campaign 9 (`hot-sidecar-latency`) closed after the saved-workspace editor
# and operator warm paths were measured, bounded, and verified on the default
# warm-cache latency budget.
# Campaign 10 briefly moved to a broader 0.4 release-surface lane. This
# manifest keeps the product lane as editor-agent integration and carries the
# useful release-readiness requirements as a gate before closeout.

objective = """
Make the saved-workspace editor loop and the agent CLI loop line up:
diagnostic to evidence to packet or brief to targeted test to verify to receipt
to cockpit and CI artifacts.
"""

end_state = [
  "A saved-workspace seam diagnostic exposes the same evidence, packet, brief, verify, and receipt path as the agent CLI",
  "Agent verify and receipt artifacts are visible in the operator cockpit and generated CI artifacts without rerunning analysis inside report joins",
  "A fixture pins the full editor-agent loop from diagnostic/action expectations through agent packet, verify, receipt, and cockpit outputs",
  "Installed CLI and VSIX proof covers the editor-agent loop without requiring ripr init activation, automatic edits, generated tests, or runtime execution"
]

