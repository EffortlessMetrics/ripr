id = "operationalization"
title = "Operationalization"
status = "active"

# This is Campaign 5B in `docs/IMPLEMENTATION_CAMPAIGNS.md`.
# Campaign 5A (`seam-evidence-usability-and-precision`) closed after the
# following chain landed:
#
# - #255 cache/repo-seam-facts-v1
# - #310 analysis/related-test-precision-v1
# - #313 analysis/value-extraction-v2
# - #314 analysis/oracle-shape-v2
# - #315 context/agent-seam-packets-v2
# - #316 lsp/seam-code-actions-v1
# - #327 calibration/cargo-mutants-v1
#
# The 5A closeout is intentionally docs/manifest only. It does not change
# analyzer behavior, output schemas, calibration behavior, or LSP behavior.

objective = """
Make ripr deployable in real repositories. Repository config should govern
analysis mode, oracle policy, severity, suppressions, and seam-diagnostic
defaults. SARIF and CI policy modes should consume that config and remain
opt-in. Badge counts should eventually remap from legacy finding counts onto
seam-native unresolved gap counts without changing static audit vocabulary.
"""

end_state = [
  "ripr.toml configures analysis mode, oracle policy, severity mapping, suppressions, and seam diagnostics defaults across CLI, reports, and LSP",
  "config defaults are conservative and preserve existing CLI flags and output schemas unless explicitly versioned",
  "SARIF output uses configured severity and suppression policy and is advisory by default",
  "CI policy modes are opt-in, baseline-aware, and do not block by default",
  "badge counts can be remapped onto seam-native unresolved gap counts after config and SARIF semantics are stable",
  "runtime mutation vocabulary remains confined to calibration/runtime reports; static reports keep audit vocabulary"
]

