id = "defaults-first-operator-adoption"
title = "Defaults-First Operator Adoption"
status = "active"

# This is Campaign 7 in `docs/IMPLEMENTATION_CAMPAIGNS.md`.
# Campaign 6 (`modularize-ripr-submodules`) closed after the refactor chain
# landed through #405. The next lane is product/operator polish, not more LSP
# feature work and not more Campaign 6 surgery.

objective = """
Make ripr useful from a clean install by giving CLI, editor, and CI users one
defaults-first path from static seam evidence to a targeted-test action and a
receipt that shows the seam improved.
"""

end_state = [
  "Built-in defaults and generated ripr.toml are documented and conservative",
  "Fast, normal, and deep mode behavior is clear and useful without hand tuning",
  "One operator cockpit joins repo exposure, LSP cockpit, SARIF, badges, targeted-test outcomes, and calibration when present",
  "The GitHub Action path uploads useful artifacts and separates advisory reporting from blocking policy",
  "The editor install path and existing commands are documented without adding speculative LSP features",
  "A small public example corpus demonstrates weak seams, targeted briefs, receipts, and optional calibration",
  "Install and release paths are verified enough for a new user to run the loop"
]

[[work_item]]
id = "defaults/config-init"
status = "done"
branch = "defaults-config-init"
stackable = false
requires_human_merge = true
acceptance = "Built-in defaults, generated ripr.toml, repo-mode exclusions, seam-diagnostic policy, badge/report defaults, and fast/normal/deep mode behavior are documented and test-pinned without changing output schemas or LSP behavior"
commands = [
  "cargo xtask check-pr",
  "cargo xtask check-public-api",
  "cargo xtask check-architecture",
  "cargo xtask check-output-contracts",
  "cargo xtask check-static-language",
  "cargo xtask check-campaign",
  "cargo xtask goals next",
  "cargo test --workspace"
]

[[work_item]]
id = "reports/operator-cockpit"
status = "done"
branch = "operator-cockpit-report"
stackable = false
requires_human_merge = true
acceptance = "target/ripr/reports/operator-cockpit.md and .json join repo exposure, LSP cockpit, SARIF policy, badge status, targeted-test outcome, and optional mutation calibration into a next-action report"
commands = [
  "cargo test -p xtask operator_cockpit",
  "cargo xtask operator-cockpit",
  "cargo xtask operator-cockpit-report",
  "cargo xtask check-pr",
  "cargo xtask check-public-api",
  "cargo xtask check-architecture",
  "cargo xtask check-output-contracts",
  "cargo xtask check-static-language",
  "cargo xtask check-campaign",
  "cargo xtask goals next",
  "cargo test --workspace"
]

