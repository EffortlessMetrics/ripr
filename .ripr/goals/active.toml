id = "assistant-loop-health"
title = "Assistant Loop Health"
status = "active"

# This is Campaign 22 in `docs/IMPLEMENTATION_CAMPAIGNS.md`.
# Campaign 21 made one assistant-directed test loop reviewable as a single
# proof report. This campaign measures whether assistant loops are complete,
# evidence-moving, and repairable across one or more proof packets.

objective = """
Make assistant-directed test work measurable over time by summarizing proof
completeness, missing inputs, static evidence movement, repeated warnings, and
next repair queues from existing proof artifacts, without changing analyzer
behavior, ranking, gate policy, editor behavior, mutation execution, provider
calls, generated tests, source edits, or default CI blocking.
"""

end_state = [
  "a public read-only command writes `target/ripr/reports/assistant-loop-health.json` and `.md` from explicit existing `test-oracle-assistant-proof` artifacts",
  "the report counts complete and partial proof packets, missing required inputs, missing optional inputs, static movement buckets, warning frequency, top affected files, and repair-queue items",
  "fixtures pin complete, partial, missing-input, unchanged, regressed, summary-only, warning-heavy, and multi-proof repair-queue cases",
  "generated CI may surface the health report only as advisory evidence when proof artifacts exist; it must not become pass/fail authority",
  "user docs explain when to read the health report instead of a single proof report and how maintainers or external agents should route repair work",
  "closeout records what is implemented, what remains advisory, and which future work must stay outside analyzer, ranking, gate, editor, provider, mutation, or generated-test semantics",
]

