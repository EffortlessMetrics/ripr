id = "release-surface-0-4"
title = "0.4 Release Surface Hardening"
status = "active"

# This is Campaign 10 in `docs/IMPLEMENTATION_CAMPAIGNS.md`.
# Campaign 9 (`hot-sidecar-latency`) closed after bounded latency reporting,
# warm-cache proof, budget-aware pilot behavior, and first-screen pilot clarity
# landed. This lane is release-surface hardening, not analyzer expansion.

objective = """
Make RIPR 0.4.0 usable in the first hour by proving the existing install,
pilot, outcome, agent verify, editor, CI, latency, example, and known-limit
surfaces from repo artifacts.
"""

end_state = [
  "A release-readiness report proves the CLI, agent verify, LSP, CI, latency, install, and known-limits surfaces from one command",
  "Checked real-repo pilot receipts show what RIPR actually reported without inventing metrics or overclaiming",
  "The landing path explains install -> ripr pilot -> one focused test -> ripr outcome or ripr agent verify before internal report details",
  "0.4.0 release preparation is backed by package, publish dry-run, install, VSIX, and readiness evidence"
]

[[work_item]]
id = "release/readiness-report"
status = "ready"
branch = "release-readiness-report"
stackable = false
requires_human_merge = true
acceptance = "Add a 0.4 release-readiness report that proves CLI, agent verify, LSP, CI, latency, install, examples, VSIX, and known-limits surfaces from repo artifacts without changing analyzer behavior"
# The implementing PR must add the new release-readiness xtask command and then
# include it in this command list. This campaign-opening PR keeps only existing
# validation gates so the active manifest stays executable on current main.
commands = [
  "cargo xtask check-output-contracts",
  "cargo xtask check-static-language",
  "cargo xtask check-campaign",
  "cargo xtask goals next",
  "cargo xtask check-pr",
  "cargo test --workspace"
]

[[work_item]]
id = "examples/real-repo-pilot-receipts"
status = "blocked"
branch = "real-repo-pilot-receipts"
stackable = false
requires_human_merge = true
blocked_by = ["release/readiness-report"]
blocked_reason = "Wait for the release-readiness report to define the release proof surface, receipt verification command, and artifact expectations."
acceptance = "Add checked non-sensitive pilot receipts from real repos that record what RIPR reported, what was useful, what was noisy, and what limits remain"
commands = [
  "cargo xtask check-static-language",
  "cargo xtask markdown-links",
  "cargo xtask check-doc-index",
  "cargo xtask check-campaign",
  "cargo xtask goals next",
  "cargo xtask check-pr"
]

