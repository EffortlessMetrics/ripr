id = "report-packet-index"
title = "Report Packet Index"
status = "active"

# This is Campaign 25 in `docs/IMPLEMENTATION_CAMPAIGNS.md`.
# Campaign 24 closed PR Review Front Panel. This campaign makes the uploaded
# `ripr-reports` packet navigable as one reviewer map from explicit existing
# artifacts.

objective = """
Make the uploaded RIPR report packet navigable as a reviewer-first index over
explicit existing artifacts: the front panel, PR guidance, first useful action,
assistant proof and health, PR evidence ledger, baseline delta, RIPR Zero, gate
decision, receipts, calibration, coverage/grip frontier, SARIF/badge outputs,
and local validation reports. The index must group artifacts by reviewer use,
show missing or stale expected surfaces, name the next command to regenerate a
missing packet, and remain advisory without changing analyzer behavior,
recommendation ranking, gate semantics, editor behavior, mutation execution,
provider calls, source files, generated tests, inline-comment defaults, or
default CI blocking.
"""

end_state = [
  "`target/ripr/reports/index.json` and `.md` are the report-packet front door for PR reviewers",
  "the index groups artifacts by start-here, PR review story, repair or agent handoff, evidence, policy or gates, calibration, validation receipts, and SARIF or badge outputs",
  "the index identifies missing expected report surfaces and suggests precise commands to regenerate them",
  "generated CI uploads and summarizes the index as advisory evidence only when source artifacts exist",
  "the index never becomes pass/fail authority and never hides gate, waiver, suppression, baseline, missing-input, or warning states",
  "fixtures and dogfood receipts cover complete packet, sparse packet, missing front-panel, blocked gate, missing proof, and coverage/grip-present cases",
]

