id = "ripr-zero-adoption"
title = "RIPR Zero Adoption"
status = "active"

# This is Campaign 17 in `docs/IMPLEMENTATION_CAMPAIGNS.md`.
# Campaign 16 closed Gate Adoption UX after generated-CI examples, waiver
# workflows, baseline guidance, summary polish, dogfood receipts, and
# blocking-readiness docs made optional gates adoptable while generated CI
# stayed advisory by default.

objective = """
Make RIPR 0 adoption concrete for PR/CI users: turn baselines into visible
burn-down ledgers, create reviewed baseline checkpoints from gate decisions,
diff current evidence against checked-in debt, support shrink-only refreshes,
and keep every new policy mode explicit and advisory by default.
"""

end_state = [
  "a baseline debt delta report compares current evidence against reviewed baseline debt without auto-adopting new findings",
  "ripr baseline create writes reviewed baseline ledgers from existing gate-decision evidence without implying accepted-forever debt",
  "ripr baseline diff reports still-present, resolved, new policy-eligible, acknowledged, suppressed, stale, invalid, and missing-input identities",
  "ripr baseline update --remove-resolved supports shrink-only baseline refreshes and never auto-adopts new debt in CI",
  "generated CI uploads baseline debt delta artifacts and summarizes debt movement while the gate evaluator remains responsible for pass or fail",
  "RIPR Zero adoption docs explain initial baseline creation, baseline-check rollout, shrink-only refresh, new debt review, and waiver versus baseline versus suppression boundaries",
]

