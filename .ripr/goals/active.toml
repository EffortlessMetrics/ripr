  "generated CI summaries make gate decisions understandable without opening JSON artifacts",
  "ripr dogfood receipts demonstrate visible-only and stricter opt-in gate behavior from repo-local evidence",
  "blocking-readiness guidance explains when teams should leave gates advisory, use acknowledgement, or enable calibrated blocking",
]

