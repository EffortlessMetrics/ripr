id = "hot-sidecar-latency"
title = "Hot Sidecar Latency Proof"
status = "active"

# This is Campaign 9 in `docs/IMPLEMENTATION_CAMPAIGNS.md`.
# Campaign 8 (`runtime-calibration-fixtures`) closed after the supplied
# cargo-mutants fixture set pinned the main static/runtime agreement buckets.
# This lane is performance and editor responsiveness, not new analyzer
# semantics or new LSP product surface.

objective = """
Make the editor and operator paths faster without broadening the analyzer or LSP
surface by measuring current cache and refresh behavior first, then tightening
warm-path reuse only where there is evidence.
"""

end_state = [
  "Current repo seam cache behavior and saved-workspace LSP refresh latency are measured from existing commands",
  "Any hot-path cache change preserves output schemas, static vocabulary, public API, SARIF, badges, and saved-workspace LSP cockpit behavior",
  "Rendered outputs remain uncached; only fact layers or in-memory indexes may be reused",
  "Large-repo and editor latency decisions are backed by reports, not speculative storage"
]

[[work_item]]
id = "cache/current-latency-audit"
status = "done"
branch = "hot-sidecar-latency-audit"
stackable = false
requires_human_merge = true
acceptance = "Current repo seam cache behavior, operator report generation, and saved-workspace LSP refresh proof are measured without changing analyzer, output, LSP, SARIF, badge, or public API behavior"
commands = [
  "cargo test -p ripr analysis::seam_cache --lib",
  "cargo test -p ripr analysis::seam_inventory --lib",
  "cargo test -p ripr lsp",
  "cargo test -p ripr lsp::tests",
  "cargo xtask lsp-cockpit-report",
  "cargo xtask operator-cockpit",
  "cargo xtask check-output-contracts",
  "cargo xtask check-static-language",
  "cargo xtask check-campaign",
  "cargo xtask goals next",
  "cargo xtask check-pr",
  "cargo test --workspace"
]

