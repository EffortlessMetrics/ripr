id = "assistant-loop-health"
title = "Assistant Loop Health"
status = "active"

# This is Campaign 23 in `docs/IMPLEMENTATION_CAMPAIGNS.md`.
# Campaign 22 closed First Useful Action. This campaign measures whether
# assistant-directed test loops are complete, stuck, missing receipts, or moving
# static evidence over time.

objective = """
Summarize proof completeness, missing inputs, static evidence movement,
recurring warnings, and next repair queues across one or more assistant proof
reports without changing analyzer behavior, recommendation ranking, gate
semantics, LSP/editor behavior, mutation execution, provider calls, source
files, generated tests, or default CI blocking.
"""

end_state = [
  "`target/ripr/reports/assistant-loop-health.json` and `.md` summarize assistant proof packet health from explicit existing proof inputs",
  "the report counts complete, partial, missing-required, and missing-optional proof packets",
  "the report summarizes static movement as improved, unchanged, regressed, or unknown using proof data only",
  "recurring warnings and missing inputs are grouped without turning into an opaque score",
  "a bounded repair queue routes maintainers or coding agents to rerun missing commands, regenerate stale inputs, inspect unchanged evidence, or attach receipts",
  "generated CI may upload and summarize the report as advisory evidence only when proof artifacts exist",
]

