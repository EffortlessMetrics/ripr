id = "first-hour-ux"
title = "First-Hour UX"
status = "active"

# This is Campaign 12 in `docs/IMPLEMENTATION_CAMPAIGNS.md`.
# Campaign 11 (`llm-work-loop`) closed after status, workflow manifests,
# provenance-backed receipts, next-action guidance, review summaries, fixtures,
# generated CI artifacts, and the LLM operator guide made the agent loop
# stateful and source-edit-free.

objective = """
Make a new user successful in the first hour through either the VS Code
extension or generated GitHub workflow, without requiring them to understand
RIPR's internal report topology.
"""

end_state = [
  "VS Code users can see server, workspace, analysis, staleness, and diagnostic state without reading logs first",
  "Editor code actions are titled around user intent: write the targeted test, open the best related test, copy an agent handoff, verify after the test, and refresh analysis",
  "Generated GitHub workflows put the top advisory recommendation in the PR or step summary before artifact download is necessary",
  "PR test guidance annotations have a spec, JSON contract, placement rules, caps, and opt-in review-comment boundary before generated workflows post line guidance",
  "Generated CI workflow behavior is pinned by a fixture that covers artifact paths, non-blocking posture, optional SARIF, badge output, and agent artifacts",
  "Agent command templates and workflow manifests from Campaign 11 feed the UX surfaces instead of creating another command-string source of truth",
  "README and installed-user docs are organized by user type: VS Code, CI, CLI, agent, troubleshooting, and known limits"
]

[[work_item]]
id = "spec/pr-test-guidance-annotations"
status = "done"
branch = "spec-pr-test-guidance-annotations"
stackable = false
requires_human_merge = true
acceptance = "Finalize the advisory PR test guidance contract before implementing `ripr review-comments`, including changed-line placement, anti-spam caps, bounded LLM guidance, check annotations by default, optional inline review comments, JSON shape, and non-blocking CI posture"
commands = [
  "cargo xtask check-doc-index",
  "cargo xtask markdown-links",
  "cargo xtask check-spec-format",
  "cargo xtask check-traceability",
  "cargo xtask check-capabilities",
  "cargo xtask check-output-contracts",
  "cargo xtask check-static-language",
  "cargo xtask check-pr"
]

[[work_item]]
id = "vscode/first-run-status"
status = "done"
branch = "vscode-first-run-status"
stackable = false
requires_human_merge = true
blocked_by = ["spec/pr-test-guidance-annotations"]
acceptance = "Add a discoverable editor status path for server resolution, workspace detection, analysis running/complete/stale/failed, and no-actionable-seam states"
commands = [
  "cargo test -p ripr lsp",
  "cargo test -p ripr lsp::tests",
  "cargo xtask lsp-cockpit-report",
  "npm --prefix editors/vscode run compile",
  "npm --prefix editors/vscode run test:e2e",
  "cargo xtask check-output-contracts",
  "cargo xtask check-static-language",
  "cargo xtask check-pr"
]

