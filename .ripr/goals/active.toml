id = "pr-review-front-panel"
title = "PR Review Front Panel"
status = "active"

# This is Campaign 24 in `docs/IMPLEMENTATION_CAMPAIGNS.md`.
# Campaign 23 closed Assistant Loop Health. This campaign makes the GitHub PR
# and generated-CI first screen tell one advisory test-oracle review story from
# explicit existing artifacts.

objective = """
Compose existing PR guidance, first useful action, assistant proof,
assistant-loop health, PR evidence ledger, baseline delta, gate decision,
receipts, calibration, and optional coverage/grip frontier artifacts into one
advisory PR review front panel that answers what matters, why, what to do next,
how to verify it, what receipt exists, and what policy state applies without
changing analyzer behavior, recommendation ranking, gate semantics, editor
behavior, mutation execution, provider calls, source files, generated tests, or
default CI blocking.
"""

end_state = [
  "`target/ripr/reports/pr-review-front-panel.json` and `.md` summarize the PR's test-oracle story from explicit existing inputs",
  "the panel shows the selected top issue or explains why no safe action is available",
  "the panel carries missing discriminator, related test, repair or agent handoff command, verify command, receipt path, and static movement when present",
  "baseline, new policy-eligible, acknowledged, waived, suppressed, and gated states remain visible without becoming hidden success",
  "optional coverage/grip and calibration inputs are surfaced as advisory context without adequacy claims",
  "generated CI may upload and summarize the panel as advisory evidence only when source artifacts exist",
]

