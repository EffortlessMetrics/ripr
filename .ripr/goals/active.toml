id = "first-useful-action"
title = "First Useful Action"
status = "active"

# This is Campaign 22 in `docs/IMPLEMENTATION_CAMPAIGNS.md`.
# Campaign 21 closed the test-oracle assistant proof report producer. This
# campaign compresses existing RIPR evidence into one advisory next action.

objective = """
Given existing RIPR artifacts, produce one advisory first-useful-action report
that tells a developer, reviewer, or coding agent what to do next, why, where,
how to verify, what receipt proves the result, and what limits remain without
rerunning hidden analysis, editing source, generating tests, calling providers,
running mutation testing, changing default CI blocking, or inventing policy.
"""

end_state = [
  "`target/ripr/reports/first-useful-action.json` and `.md` summarize the highest-value next test action or the reason no action should be taken",
  "routing is deterministic over explicit existing inputs such as PR guidance, PR evidence ledger, baseline debt delta, assistant proof, receipts, optional gate decisions, optional coverage/grip frontier, editor context, and status/staleness",
  "fixtures pin actionable, stale, missing-artifact, baseline-only, acknowledged, waived, suppressed, already-improved, unchanged-after-attempt, and no-actionable-seam cases",
  "generated CI surfaces the first useful action as advisory summary/artifact content without changing pass/fail authority",
  "the editor may project the report in status or Show Status without new diagnostics, CodeLens, inlay hints, unsaved-buffer overlays, source edits, or generated tests",
  "docs and dogfood receipts show how developers, reviewers, and agents use the action without treating static evidence as runtime proof",
]

