id = "adoption-and-calibration"
title = "Adoption and Calibration"
status = "active"

# This is Campaign 5 in `docs/IMPLEMENTATION_CAMPAIGNS.md`. Campaign 4B
# (`repo-seam-inventory-test-grip`) closed here, leaving the Voice B
# product loop in place: RepoSeam model, repo seam inventory, test-grip
# evidence, SeamGripClass classification, repo exposure report, agent
# seam packets, LSP seam diagnostics, seam evidence hover, and agent
# dispatch docs. Cache and calibration items carry forward to this
# campaign because they depend on the now-stable seam IDs; their
# original homes in Campaign 4B's table are marked `rolled-forward`.

objective = """
Make `ripr` practical in repositories, CI, and external operationalization
loops. Cache the seam fact layers so seam diagnostics can be default-on
without multi-second editor latency. Calibrate static SeamGripClass
predictions against real cargo-mutants outcomes without adopting
mutation-runtime language in static output. Add repository config and
CI/SARIF policy modes once the analyzer surface is stable.
"""

end_state = [
  "seam fact layers cache cleanly so cold path still works and warm path avoids full inventory when inputs are unchanged",
  "cache invalidates on source/config/intent/suppression changes; repo exposure report and LSP diagnostics consume the same cached fact source",
  "calibration scaffold compares static SeamGripClass against cargo-mutants outcomes per seam_id, seam_kind, oracle kind/strength, missing discriminator, mutation operator, and runtime outcome",
  "calibration output is advisory and lives in calibration/runtime reports; static reports keep the audit vocabulary (test grip, missing discriminator, static evidence, runtime confirmation)",
  "ripr-config-v1 covers analysis mode, oracle policy, severity, and seam-diagnostics defaults",
  "ci/sarif-ci-policy emits SARIF and an opt-in baseline-aware blocking policy without churning the existing JSON schema"
]

[[work_item]]
id = "cache/repo-seam-facts-v1"
status = "ready"
branch = "cache/repo-seam-facts-v1"
stackable = false
requires_human_merge = true
acceptance = "optional fact-layer cache (file-facts, owner-index, seam-facts; never final outputs); cold path still works; warm path avoids full inventory when inputs are unchanged; cache invalidates on source/config/intent/suppression changes; keyed by schema version, ripr analyzer version, file path + content hash, cfg/features hash, config hash, intent hash, suppressions hash; repo exposure report and LSP diagnostics consume the same cached fact source; lifts the seamDiagnostics default once warm-path latency is acceptable"
commands = [
  "cargo xtask shape",
  "cargo xtask fix-pr",
  "cargo xtask check-pr"
]

[[work_item]]
id = "calibration/cargo-mutants-v1"
status = "ready"
branch = "calibration/cargo-mutants-v1"
stackable = false
requires_human_merge = true
acceptance = "scaffold for comparing static seam classes against cargo-mutants outcomes; tracks seam_id, seam_kind, seam_grip_class, oracle kind/strength, missing discriminator, mutation operator, and runtime outcome; advisory only; runtime mutation vocabulary appears only in calibration/runtime reports; static reports continue using the audit vocabulary (test grip, missing discriminator, static evidence, runtime confirmation); v2 path toward calibrated test-grip"
commands = [
  "cargo xtask shape",
  "cargo xtask fix-pr",
  "cargo xtask check-pr",
  "cargo xtask check-static-language"
]

