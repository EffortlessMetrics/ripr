id = "seam-evidence-usability-and-precision"
title = "Seam Evidence Usability and Precision"
status = "active"

# This is Campaign 5A in `docs/IMPLEMENTATION_CAMPAIGNS.md`. Campaign 4B
# (`repo-seam-inventory-test-grip`) closed in #252 leaving the seam
# evidence loop in place: RepoSeam model, repo seam inventory, test-grip
# evidence, SeamGripClass classification, repo exposure report, agent
# seam packets, LSP seam diagnostics, seam evidence hover, and agent
# dispatch docs.
#
# Campaign 5 was originally framed as `adoption-and-calibration`
# (cache + calibration + config + ci/sarif). That framing was too
# operational — it skipped the precision and actionability work that
# makes seam evidence useful every day. Campaign 5A reframes the queue
# around four product axes: fast (cache), precise (related-test,
# value, oracle-shape), actionable (agent packets v2, LSP code
# actions), and calibrated (cargo-mutants). Operationalization items
# (config, ci/sarif) move to Campaign 5B once the signal is fast and
# precise.
#
# Cache serialization policy: do not use bincode. If binary
# serialization is needed, use postcard. Keep cache serialization
# behind a codec boundary. Never cache rendered JSON, Markdown,
# diagnostics, hover, or packet strings — fact layers only.

objective = """
Make repo seam evidence fast, precise, and directly actionable for
developers and coding agents, without adopting mutation-runtime
language in static output. Cache the seam fact layers so seam
diagnostics can be considered default-on without multi-second editor
latency. Sharpen related-test ranking, activation/value extraction,
and oracle-shape detection. Surface seam packets and assertions
through editor code actions. Calibrate static SeamGripClass
predictions against real cargo-mutants outcomes inside calibration
reports only.
"""

end_state = [
  "seam fact layers cache cleanly so the cold path still works and the warm path avoids full inventory when inputs are unchanged",
  "cache invalidates on source/config/intent/suppression changes; repo exposure report and LSP diagnostics consume the same cached fact source",
  "no rendered outputs are cached; cache serialization stays behind a codec boundary; binary serialization, when introduced, uses postcard (never bincode)",
  "related-test fanout is reduced and ranked; related tests carry relation_reason and relation_confidence; high-fanout files show fewer irrelevant top related tests; related_tests_total remains available",
  "activation/value evidence detects common Rust test data patterns (let bindings, constants, builder methods, table-driven cases, rstest cases, enum variants, Option/Result constructors, fixture factories); activation_unknown count falls on dogfood repo without new false positives against negative fixtures",
  "oracle-shape evidence recognizes assert_matches exact variants, field assertions, whole-object equality, snapshot calls with visible field names, mock expectations, and event/state/persistence assertions; is_err-only stays weak; exact variant assertion stays strong",
  "agent seam packet v2 carries recommended test name, recommended test file, nearest strong test to imitate, candidate input values, assertion shape with example, patterns to imitate, patterns to avoid, and confidence — enough to write the targeted test directly",
  "LSP code actions surface 'Copy seam packet', 'Copy suggested assertion', 'Open related test', and 'Refresh ripr analysis' for diagnostics that carry seam_id; no automatic edits or generated tests",
  "calibration scaffold compares static SeamGripClass against cargo-mutants outcomes per seam_id, seam_kind, oracle kind/strength, observed values, missing discriminator, mutation operator, runtime outcome, duration, and test command",
  "calibration output is advisory and lives in calibration/runtime reports; static reports keep the audit vocabulary (test grip, missing discriminator, static evidence, runtime confirmation)"
]

