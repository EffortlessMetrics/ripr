id = "release/real-repo-trust-issue-triage"
status = "done"
branch = "release-real-repo-trust-triage"
stackable = false
acceptance = "Classify #913, #912/#909, and #908/#910/#911 as the current real-repo trust issue batch; link the duplicate/overlap cluster; label release-line blockers or post-0.8 follow-ups honestly; update 0.8.0 release/freeze non-claims so the published tag is not represented as fixing these new issues."
commands = [
  "cargo xtask check-goals",
  "cargo xtask goals next",
  "cargo xtask check-doc-index",
  "cargo xtask markdown-links",
  "cargo xtask check-static-language",
  "cargo xtask check-doc-roles",
  "cargo xtask check-pr",
]

