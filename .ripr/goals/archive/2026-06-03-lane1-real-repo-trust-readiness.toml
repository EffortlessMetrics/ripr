# Archived by `cargo xtask closeout --goal lane1-real-repo-trust-readiness` on 2026-06-03.
id = "lane1-real-repo-trust-readiness"
title = "Lane 1 Real-Repo Trust Readiness"
status = "closed"
lane = "lane1"
issue = "https://github.com/EffortlessMetrics/ripr-swarm/issues/913"
no_current_goal = true

# Selected after the self-hosted routed runner proof campaign closed with
# `no_current_goal = true`. Live repo state on 2026-06-03 shows 0.8.0 already
# published, so this campaign treats the new large-repo and cross-language
# issue batch as post-release trust debt / hotfix candidates, not as claims
# already satisfied by the published 0.8.0 tag. The issue-batch slices landed
# through #931, and no successor campaign is selected.

objective = """
Make RIPR's evidence-to-repair foundation honest on large and mixed-language
repositories: review surfaces must be navigable, large seam-cache limits must
be explicit named limitations, and cross-language or binding/FFI seams must
fail closed instead of emitting wrong Rust repair work.
"""

end_state = [
  "review-comments Markdown includes source file and line/span next to each seam row, or an explicit source_location_unresolved limitation route",
  "large repo seam-cache skips report observed seam count, configured limit, downstream consumability, and a repair/configuration route instead of silently disappearing",
  "Rust seams reached through TypeScript, binding, or FFI surfaces fail closed as cross_language_oracle_visibility_unresolved or cross_language_target_unresolved until RIPR can prove the external oracle path",
  "public repair-packet queues exclude incomplete or cross-language-unresolved packets and preserve blocked-state / limitation routes",
  "0.8.x release-line notes and issue labels do not claim the published 0.8.0 tag fixed behavior that landed only afterward",
]

hard_rules = [
  "do not force actionability",
  "do not suggest unrelated Rust test files for binding or FFI seams",
  "do not silently skip cache on large repositories",
  "do not represent sampled, stale, or limited runs as full",
  "source ripr remains release, signing, publishing, and distribution authority",
]

non_goals = [
  "no provider integration",
  "no autonomous edits",
  "no mutation execution",
  "no default blocking CI or badge semantic switch",
  "no claim that full cross-language oracle proof exists",
  "no claim that every large-repo run is full",
  "no source release, publish, tag, signing, marketplace, or install-doc work without explicit release authorization",
]

