objective = """
Make suggested-test placement safe and useful for binding, FFI, and externally
tested seams by routing known external target evidence as navigation-only
limitation context, while keeping unknown targets fail-closed instead of
emitting unrelated Rust test files or repair packets.
"""

end_state = [
  "ordinary Rust seams with direct Rust-side test context continue to suggest only locally supported Rust test targets",
  "binding, FFI, or externally tested seams with explicit configured external observer evidence can surface a navigation-only target file and route without becoming public repair packets",
  "binding, FFI, or externally tested seams without explicit target evidence keep suggested test placement unknown or not applicable with a named blocked route",
  "LSP, review-comments, and agent packet surfaces suppress repair actions whenever allowed_edit_surface, verify_command, receipt_command, or target shape are unresolved",
  "readiness and route-quality surfaces preserve language-aware target-placement limitations as limitations rather than actionability",
]

hard_rules = [
  "do not suggest unrelated Rust test files for binding or FFI seams",
  "do not infer TypeScript, Python, or other external test targets without explicit bridge or observer evidence",
  "do not create public repair packets from navigation-only external target evidence",
  "do not invent verify commands, receipt commands, candidate values, or allowed edit surfaces for unresolved external targets",
  "do not claim full cross-language oracle graph proof or runtime coverage proof",
  "do not claim 0.8.0 on crates.io includes post-release swarm fixes",
  "source ripr remains release, signing, publishing, and distribution authority",
]

non_goals = [
  "no provider integration",
  "no autonomous edits",
  "no mutation execution",
  "no default blocking CI or badge semantic switch",
  "no full cross-language oracle proof",
  "no generated tests",
  "no source release, publish, tag, signing, marketplace, or install-doc work without explicit release authorization",
]

