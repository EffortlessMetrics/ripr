# Traceability manifest for long-context work.
#
# This file maps behavior specs to the tests, code, output contracts, and
# metrics that prove or track them. It starts as a lightweight manifest and will
# become mechanically checked as xtask traceability work lands.

[[behavior]]
id = "RIPR-SPEC-0001"
name = "static exposure loop"
spec = "docs/specs/RIPR-SPEC-0001-static-exposure-loop.md"
tests = [
  "crates/ripr/src/analysis/classifier.rs",
  "crates/ripr/src/analysis/rust_index.rs",
  "crates/ripr/src/analysis/mod.rs",
  "crates/ripr/tests/cli_smoke.rs"
]
fixtures = [
  "fixtures/boundary_gap",
  "fixtures/weak_error_oracle"
]
code = [
  "crates/ripr/src/domain",
  "crates/ripr/src/app.rs",
  "crates/ripr/src/analysis",
  "crates/ripr/src/output",
  "crates/ripr/src/cli",
  "crates/ripr/src/lsp.rs"
]
outputs = [
  "docs/OUTPUT_SCHEMA.md",
  "docs/STATIC_EXPOSURE_MODEL.md",
  "fixtures/boundary_gap/expected/check.json",
  "fixtures/boundary_gap/expected/human.txt",
  "fixtures/weak_error_oracle/expected/check.json",
  "fixtures/weak_error_oracle/expected/human.txt"
]
metrics = [
  "fixture_pass_rate",
  "oracle_kind_recognition_rate",
  "unknowns_with_stop_reasons"
]

[[behavior]]
id = "RIPR-SPEC-0002"
name = "fixture laboratory"
spec = "docs/specs/RIPR-SPEC-0002-fixture-laboratory.md"
tests = []
fixtures = [
  "fixtures/boundary_gap",
  "fixtures/weak_error_oracle"
]
code = [
  "xtask/src/main.rs"
]
outputs = [
  "fixtures/boundary_gap/expected/check.json",
  "fixtures/boundary_gap/expected/human.txt",
  "fixtures/weak_error_oracle/expected/check.json",
  "fixtures/weak_error_oracle/expected/human.txt"
]
metrics = [
